<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kontor — Wirtschaftssimulation</title>
<meta name="theme-color" content="#0c3327">
<meta name="description" content="Kontor — baue dein Wirtschaftsimperium auf. Eine Wirtschaftssimulation für den Browser.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kontor">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,800&family=Familjen+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0c3327;
    --green-800:#10402f;
    --green-700:#16513c;
    --green-600:#1d6349;
    --paper:#f2ece0;
    --paper-2:#e7dfce;
    --ink:#16201b;
    --ink-soft:#46584f;
    --brass:#c9a24b;
    --brass-bright:#e3c074;
    --gain:#2c8a55;
    --loss:#bc4334;
    --line:rgba(22,32,27,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Familjen Grotesk',system-ui,sans-serif;
    background:var(--green-900);
    color:var(--ink);
    overflow:hidden;
    position:fixed;width:100%;
  }
  #app{display:flex;flex-direction:column;height:100%;max-width:560px;margin:0 auto;background:var(--paper);position:relative}

  /* ---------- Status bar ---------- */
  .status{
    background:linear-gradient(180deg,var(--green-800),var(--green-900));
    color:var(--paper);
    padding:10px 14px 8px;
    border-bottom:2px solid var(--brass);
    flex:0 0 auto;
  }
  .status-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .company{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.2px;color:var(--brass-bright);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(242,236,224,.6);letter-spacing:1px;text-transform:uppercase}
  .status-grid{display:flex;gap:14px;margin-top:6px;align-items:flex-end}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat .lbl{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(242,236,224,.55);font-weight:600}
  .stat .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--paper)}
  .stat.cash .val{color:var(--brass-bright)}
  .stat.networth .val{font-size:14px}
  .controls{margin-left:auto;display:flex;gap:6px;align-items:center}
  .ctrl{
    background:rgba(242,236,224,.08);border:1px solid rgba(242,236,224,.2);color:var(--paper);
    width:34px;height:30px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.12s;font-family:'JetBrains Mono',monospace;
  }
  .ctrl:active{transform:scale(.92)}
  .ctrl.active{background:var(--brass);border-color:var(--brass);color:var(--green-900)}
  .lvlbar{margin-top:8px;height:5px;border-radius:3px;background:rgba(242,236,224,.14);overflow:hidden}
  .lvlbar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass),var(--brass-bright));transition:width .3s}

  /* ---------- Ticker ---------- */
  .ticker{
    background:var(--green-900);color:var(--paper);overflow:hidden;white-space:nowrap;
    border-bottom:1px solid rgba(201,162,75,.35);flex:0 0 auto;position:relative;
  }
  .ticker-track{display:inline-block;padding:6px 0;animation:scroll 38s linear infinite;font-family:'JetBrains Mono',monospace;font-size:12px}
  .ticker:hover .ticker-track{animation-play-state:paused}
  .ticker .tk{margin:0 18px}
  .ticker .tk .nm{color:rgba(242,236,224,.65)}
  .up{color:#5fc98a}.down{color:#e0796b}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){.ticker-track{animation:none}}

  /* ---------- Content ---------- */
  .content{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}
  .sect-title{font-family:'Fraunces',serif;font-weight:600;font-size:13px;letter-spacing:.4px;color:var(--ink);
    margin:2px 2px 10px;display:flex;align-items:center;gap:8px}
  .sect-title::after{content:"";flex:1;height:1px;background:var(--line)}
  .hint{background:var(--paper-2);border:1px dashed var(--brass);border-radius:10px;padding:12px 14px;font-size:13px;
    color:var(--ink-soft);line-height:1.4;margin-bottom:14px}
  .hint b{color:var(--ink)}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;
    box-shadow:0 1px 0 rgba(22,32,27,.04)}
  .row{display:flex;align-items:center;gap:11px}
  .ico{width:42px;height:42px;border-radius:10px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;
    font-size:22px;flex:0 0 auto}
  .grow{flex:1;min-width:0}
  .name{font-weight:600;font-size:14.5px;color:var(--ink)}
  .sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px;font-family:'JetBrains Mono',monospace}
  .pill{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;
    background:var(--paper-2);color:var(--ink-soft)}
  .owned{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--brass);min-width:26px;text-align:right}

  .btn{border:none;border-radius:9px;font-family:'Familjen Grotesk',sans-serif;font-weight:600;cursor:pointer;
    transition:.12s;font-size:13px;padding:9px 12px;white-space:nowrap}
  .btn:active{transform:scale(.95)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-build{background:var(--green-700);color:var(--paper);width:100%;margin-top:10px;font-size:13.5px}
  .btn-build .c{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--brass-bright);margin-left:6px}
  .locked{opacity:.55;filter:grayscale(.4)}
  .lock-tag{font-size:11px;color:var(--loss);font-weight:600;font-family:'JetBrains Mono',monospace}

  .chain{font-size:11px;color:var(--ink-soft);margin-top:7px;background:var(--paper);border-radius:7px;padding:6px 8px;
    font-family:'JetBrains Mono',monospace}
  .chain .arr{color:var(--brass);font-weight:700}

  /* market */
  .mk-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .price{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px}
  .mk-trend{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
  .trade{display:flex;gap:6px;margin-top:10px}
  .trade .btn{flex:1;padding:8px 4px;font-size:12px}
  .sell{background:var(--gain);color:#fff}
  .sellall{background:var(--green-800);color:#fff}
  .buy{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .stockbar{height:4px;border-radius:2px;background:var(--paper-2);margin-top:8px;overflow:hidden}
  .stockbar i{display:block;height:100%;background:var(--brass)}
  .auto{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
  .autotgl{background:var(--paper-2);color:var(--ink-soft);padding:7px 11px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-family:inherit}
  .autotgl.on{background:var(--gain);color:#fff}
  .autolim{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .autolim b{color:var(--ink)}
  .autolim button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer;font-size:15px;color:var(--ink);line-height:1}
  .bankgrid{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .bankgrid .btn{flex:1;min-width:calc(50% - 3px);padding:9px 4px;font-size:12.5px}
  .loan{background:var(--green-700);color:#fff}
  .repay{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .spark{width:100%;height:66px;display:block}
  .spark polyline{fill:none;stroke:var(--brass);stroke-width:2;vector-effect:non-scaling-stroke}
  .spark .area{fill:rgba(201,162,75,.13);stroke:none}

  /* log */
  .log{font-size:12.5px;line-height:1.5}
  .log .e{padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:8px}
  .log .e .d{font-family:'JetBrains Mono',monospace;color:var(--brass);flex:0 0 auto;font-size:11px;padding-top:1px}
  .log .e.good .t{color:var(--gain)}
  .log .e.bad .t{color:var(--loss)}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .field label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .field input{font-family:'Fraunces',serif;font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  .danger{background:var(--loss);color:#fff;width:100%;margin-top:6px}

  /* ---------- Tab bar ---------- */
  .tabs{position:absolute;left:0;right:0;bottom:0;display:flex;background:var(--green-900);
    border-top:2px solid var(--brass);max-width:560px;margin:0 auto}
  .tab{flex:1;background:none;border:none;color:rgba(242,236,224,.5);padding:9px 4px 11px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;transition:.12s}
  .tab .ic{font-size:18px}
  .tab .tl{font-size:10px;letter-spacing:.5px;font-weight:600}
  .tab.active{color:var(--brass-bright)}

  /* overlay */
  .overlay{position:absolute;inset:0;background:rgba(12,51,39,.94);z-index:30;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--paper)}
  .overlay h1{font-family:'Fraunces',serif;font-weight:800;font-size:30px;color:var(--brass-bright);margin-bottom:10px;line-height:1.1}
  .overlay p{font-size:14px;color:rgba(242,236,224,.8);max-width:340px;line-height:1.5;margin-bottom:22px}
  .overlay .btn{background:var(--brass);color:var(--green-900);font-size:15px;padding:13px 28px}
  .toast{position:absolute;left:50%;transform:translateX(-50%);bottom:78px;background:var(--green-800);
    color:var(--paper);border:1px solid var(--brass);padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;
    z-index:20;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .toast.show{opacity:1}
  .hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <!-- STATUS -->
  <div class="status">
    <div class="status-top">
      <div class="company" id="s-company">Mein Kontor</div>
      <div class="day" id="s-day">Tag 1</div>
    </div>
    <div class="status-grid">
      <div class="stat cash"><span class="lbl">Kapital</span><span class="val" id="s-cash">5.000 €</span></div>
      <div class="stat networth"><span class="lbl">Konzernwert</span><span class="val" id="s-net">5.000 €</span></div>
      <div class="controls">
        <button class="ctrl" id="c-pause" title="Pause">❚❚</button>
        <button class="ctrl active" id="c-play" title="Start">▶</button>
        <button class="ctrl" id="c-speed" title="Geschwindigkeit">1×</button>
      </div>
    </div>
    <div class="status-top" style="margin-top:8px">
      <div class="day" id="s-level">Stufe 1 · Kleinhändler</div>
      <div class="day" id="s-xp"></div>
    </div>
    <div class="lvlbar"><i id="s-lvlbar" style="width:0%"></i></div>
  </div>

  <!-- TICKER -->
  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="betrieb"><span class="ic">🏭</span><span class="tl">Betrieb</span></button>
    <button class="tab" data-tab="markt"><span class="ic">📈</span><span class="tl">Markt</span></button>
    <button class="tab" data-tab="konzern"><span class="ic">📊</span><span class="tl">Konzern</span></button>
  </div>

  <!-- OVERLAY -->
  <div class="overlay hidden" id="overlay"></div>
</div>

<script>
/* ============ KONFIGURATION ============ */
const GOODS = {
  weizen:   {name:"Weizen",   base:3,  ico:"🌾"},
  milch:    {name:"Milch",    base:5,  ico:"🥛"},
  stoff:    {name:"Stoff",    base:6,  ico:"🧵"},
  mehl:     {name:"Mehl",     base:9,  ico:"🌾"},
  brot:     {name:"Brot",     base:28, ico:"🍞"},
  kaese:    {name:"Käse",     base:22, ico:"🧀"},
  kleidung: {name:"Kleidung", base:35, ico:"👕"},
};

const BUILDINGS = {
  bauernhof:   {name:"Bauernhof",   ico:"🚜", unlock:1, cost:1200,  upkeep:10, produces:{weizen:8}, consumes:{}},
  kuhstall:    {name:"Kuhstall",    ico:"🐄", unlock:1, cost:1600,  upkeep:15, produces:{milch:6},  consumes:{}},
  weberei:     {name:"Baumwollfeld",ico:"🌿", unlock:2, cost:2500,  upkeep:18, produces:{stoff:6},  consumes:{}},
  muehle:      {name:"Mühle",       ico:"⚙️", unlock:3, cost:4000,  upkeep:25, produces:{mehl:6},   consumes:{weizen:6}},
  baeckerei:   {name:"Bäckerei",    ico:"🥖", unlock:4, cost:9000,  upkeep:40, produces:{brot:5},   consumes:{mehl:6}},
  kaeserei:    {name:"Käserei",     ico:"🧀", unlock:4, cost:8000,  upkeep:35, produces:{kaese:4},  consumes:{milch:6}},
  schneiderei: {name:"Schneiderei", ico:"✂️", unlock:5, cost:11000, upkeep:45, produces:{kleidung:4},consumes:{stoff:6}},
};

const TITLES = ["Kleinhändler","Krämer","Kaufmann","Fabrikant","Großhändler","Industrieller","Magnat","Tycoon","Imperator"];
const LEVELS = [0, 4000, 12000, 30000, 80000, 200000, 500000, 1200000, 3000000];
const GOAL = 1000000;
const SPEEDS = [1,2,4];
const BASE_TICK = 2600;            // ms pro Tag bei 1× (vorher 1000) — Tage vergehen langsamer
const CAP_BASE = 700, CAP_PER_LEVEL = 700; // Lagerkapazität je Ware, wächst mit der Stufe

/* ============ ZUSTAND ============ */
let S;
function freshState(name){
  const prices = {};
  for(const g in GOODS) prices[g] = GOODS[g].base;
  return {
    company: name || "Mein Kontor",
    cash: 5000, day: 1, xp: 0, totalInvested: 0,
    buildings: {}, warehouse: {}, prices,
    running: true, speedIdx: 0, tab:"betrieb",
    log: [{day:1, t:"Kontor eröffnet. Baue deinen ersten Betrieb.", c:""}],
    won:false, bankrupt:false, cashHist:[5000],
    debt:0, auto:{}, netHist:[],
  };
}

/* ============ HILFEN ============ */
const $ = id => document.getElementById(id);
const fmt = n => Math.round(n).toLocaleString('de-DE');
const eur = n => fmt(n)+" €";
function level(){ let l=1; for(let i=1;i<LEVELS.length;i++) if(S.xp>=LEVELS[i]) l=i+1; return l; }
function capacity(){ return CAP_BASE + (level()-1)*CAP_PER_LEVEL; }
function avgProfit(){ const h=S.cashHist; if(h.length<2) return 0; return (h[h.length-1]-h[0])/(h.length-1); }
function buildCost(id){ const owned=S.buildings[id]||0; return Math.round(BUILDINGS[id].cost*Math.pow(1.6,owned)); }
function netWorth(){
  let n = S.cash + S.totalInvested*0.5 - (S.debt||0);
  for(const g in S.warehouse) n += (S.warehouse[g]||0)*S.prices[g];
  return n;
}
function assetsValue(){ return netWorth() + (S.debt||0); }
function creditLimit(){ return Math.max(10000, Math.round(assetsValue()*0.5)); }
function sparkSVG(data){
  if(!data || data.length<2) return `<div class="sub" style="color:var(--ink-soft)">Noch nicht genug Daten — spiel ein paar Tage.</div>`;
  const w=300,h=66,pad=4, min=Math.min(...data), max=Math.max(...data), range=(max-min)||1;
  const pts=data.map((v,i)=>{ const x=pad+i/(data.length-1)*(w-2*pad); const y=h-pad-((v-min)/range)*(h-2*pad); return x.toFixed(1)+','+y.toFixed(1); });
  const area=`${pad},${h-pad} `+pts.join(' ')+` ${(w-pad)},${h-pad}`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polygon class="area" points="${area}"/><polyline points="${pts.join(' ')}"/></svg>`;
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }
function addLog(t,c){ S.log.unshift({day:S.day,t,c}); if(S.log.length>40) S.log.pop(); }

/* ============ SPIELSCHLEIFE ============ */
let loop=null;
function startLoop(){
  if(loop) clearInterval(loop);
  if(!S.running) return;
  loop = setInterval(tick, BASE_TICK/SPEEDS[S.speedIdx]);
}
function tick(){
  S.day++;
  let upkeepTotal=0, overflow=false;
  const cap=capacity();

  // Produktion
  for(const id in BUILDINGS){
    const cnt = S.buildings[id]||0; if(!cnt) continue;
    const b = BUILDINGS[id];
    let active = cnt;
    for(const inp in b.consumes){
      const have = S.warehouse[inp]||0;
      active = Math.min(active, Math.floor(have/b.consumes[inp]));
    }
    if(active<=0){ continue; }
    for(const inp in b.consumes) S.warehouse[inp] -= b.consumes[inp]*active;
    for(const out in b.produces){
      const cur=S.warehouse[out]||0, add=b.produces[out]*active;
      if(cur+add>cap){ S.warehouse[out]=cap; overflow=true; }
      else S.warehouse[out]=cur+add;
    }
    upkeepTotal += b.upkeep*active;
  }
  S.cash -= upkeepTotal;
  if(overflow && S.day%6===0) addLog("Lager voll — Überschuss verfällt. Verkaufen oder Stufe steigen.","bad");

  // Marktbewegung: schwache Rückkehr zum Mittel, kräftiges Rauschen → stärkere Schwankungen
  for(const g in GOODS){
    const base=GOODS[g].base; let p=S.prices[g];
    p += (base-p)*0.022 + base*0.10*(Math.random()*2-1);
    S.prices[g] = Math.max(base*0.25, Math.min(base*3.2, p));
  }

  // Zufallsereignisse: häufiger und heftiger
  if(Math.random()<0.08){
    const keys=Object.keys(GOODS); const g=keys[Math.floor(Math.random()*keys.length)];
    if(Math.random()<0.5){ S.prices[g]*=1.9;  addLog(`Nachfrageschub: ${GOODS[g].name} im Höhenflug.`,"good"); toast(`📈 ${GOODS[g].name} +90%`);}
    else{ S.prices[g]*=0.45; addLog(`Marktschwemme: ${GOODS[g].name} bricht ein.`,"bad");  toast(`📉 ${GOODS[g].name} −55%`);}
    S.prices[g]=Math.max(GOODS[g].base*0.25,Math.min(GOODS[g].base*3.2,S.prices[g]));
  }

  // Kreditzinsen
  if(S.debt>0) S.debt += S.debt*0.0015;
  // Auto-Verkauf bei erreichtem Limit
  autoSellTick();

  // Insolvenz (Konzernwert tief negativ)
  if(netWorth() < -15000 && !S.bankrupt){ S.bankrupt=true; S.running=false; clearInterval(loop); showOverlay("Insolvenz","Dein Konzern ist überschuldet. Die Gläubiger übernehmen das Ruder.","Neu gründen",()=>newGame()); }
  // Sieg
  if(!S.won && netWorth()>=GOAL){ S.won=true; addLog("Konzernwert über 1.000.000 € — Millionär!","good"); showOverlay("Millionär!","Dein Konzernwert hat die Million geknackt. Weiter geht's Richtung Milliarde.","Weiterspielen",()=>hideOverlay()); }

  S.cashHist.push(S.cash); if(S.cashHist.length>11) S.cashHist.shift();
  S.netHist.push(Math.round(netWorth())); if(S.netHist.length>60) S.netHist.shift();
  persist();
  render();
}
function autoSellTick(){
  for(const g in GOODS){
    const a=S.auto[g]; const have=S.warehouse[g]||0;
    if(a && a.on && have>0 && S.prices[g]>=a.limit){
      const net=have*S.prices[g]*0.9;
      S.warehouse[g]=0; S.cash+=net; S.xp+=net;
      S.prices[g]*=(1-Math.min(0.18,0.0009*have));
      S.prices[g]=Math.max(GOODS[g].base*0.4,S.prices[g]);
    }
  }
}

/* ============ AKTIONEN ============ */
function build(id){
  const cost=buildCost(id);
  if(S.cash<cost){ toast("Nicht genug Kapital."); return; }
  if(level()<BUILDINGS[id].unlock){ return; }
  S.cash-=cost; S.totalInvested+=cost;
  S.buildings[id]=(S.buildings[id]||0)+1;
  addLog(`${BUILDINGS[id].name} gebaut (${eur(cost)}).`,"");
  render(); persist();
}
function sell(g, amt){
  const have=S.warehouse[g]||0; if(have<=0){ toast("Lager leer."); return; }
  const qty = amt==='all'?have:Math.min(amt,have);
  const gross = qty*S.prices[g];
  const net = gross*0.9; // 10% Marktgebühr (wie im Original)
  S.warehouse[g]-=qty; S.cash+=net; S.xp+=net;
  S.prices[g]*=(1-Math.min(0.18,0.0009*qty)); // Verkaufsdruck senkt Preis
  S.prices[g]=Math.max(GOODS[g].base*0.4,S.prices[g]);
  toast(`+${eur(net)} (${qty}× ${GOODS[g].name})`);
  render(); persist();
}
function buy(g, qty){
  const cost = qty*S.prices[g];
  if(S.cash<cost){ toast("Nicht genug Kapital."); return; }
  S.cash-=cost; S.warehouse[g]=(S.warehouse[g]||0)+qty;
  S.prices[g]*=(1+Math.min(0.15,0.0008*qty));
  S.prices[g]=Math.min(GOODS[g].base*2.3,S.prices[g]);
  toast(`−${eur(cost)} (${qty}× ${GOODS[g].name})`);
  render(); persist();
}
function takeLoan(amt){
  const avail=creditLimit()-(S.debt||0);
  amt=Math.min(amt,avail);
  if(amt<=0){ toast("Kein Kreditrahmen frei."); return; }
  S.debt=(S.debt||0)+amt; S.cash+=amt;
  addLog(`Kredit aufgenommen: ${eur(amt)}.`,"");
  render(); persist();
}
function repayLoan(amt){
  amt=Math.min(amt, S.debt||0, Math.max(0,S.cash));
  if(amt<=0){ toast("Nichts zu tilgen oder kein Kapital."); return; }
  S.debt-=amt; S.cash-=amt;
  addLog(`Kredit getilgt: ${eur(amt)}.`,"");
  render(); persist();
}
function toggleAuto(g){
  if(!S.auto[g]) S.auto[g]={on:false, limit:Math.round(GOODS[g].base*1.4)};
  S.auto[g].on=!S.auto[g].on;
  render(); persist();
}
function adjAuto(g,dir){
  if(!S.auto[g]) S.auto[g]={on:false, limit:Math.round(GOODS[g].base*1.4)};
  const step=Math.max(1,Math.round(GOODS[g].base*0.1));
  S.auto[g].limit=Math.max(1, S.auto[g].limit+dir*step);
  render(); persist();
}
function setTab(t){ S.tab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t)); render(); }
function setPlay(on){ S.running=on; $('c-play').classList.toggle('active',on); $('c-pause').classList.toggle('active',!on); startLoop(); }
function cycleSpeed(){ S.speedIdx=(S.speedIdx+1)%SPEEDS.length; $('c-speed').textContent=SPEEDS[S.speedIdx]+"×"; startLoop(); }
function newGame(){ const nm=S.company; wipeSave(); S=freshState(nm); hideOverlay(); $('c-speed').textContent="1×"; setPlay(true); render(); persist(); }

/* ============ SPEICHERN (Gerät) ============ */
const SAVEKEY='kontor:save:v1';
function lsOK(){ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }catch(e){ return false; } }
const HAS_LS=lsOK();
function persist(){ if(!HAS_LS) return; try{ localStorage.setItem(SAVEKEY, JSON.stringify(S)); }catch(e){} }
function loadSaved(){ if(!HAS_LS) return null; try{ const r=localStorage.getItem(SAVEKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function wipeSave(){ if(!HAS_LS) return; try{ localStorage.removeItem(SAVEKEY); }catch(e){} }
function hydrate(d){ const s=Object.assign(freshState(d.company), d); s.running=false; return s; }
function saveGame(){ if(!HAS_LS){ toast("Speichern hier nicht verfügbar."); return; } persist(); toast("Spielstand gespeichert."); }
function loadGame(){ const d=loadSaved(); if(d){ S=hydrate(d); $('c-speed').textContent=SPEEDS[S.speedIdx]+"×"; setPlay(false); render(); toast("Spielstand geladen."); } else toast("Kein Spielstand gefunden."); }

/* ============ RENDERING ============ */
function render(){
  // Status
  $('s-company').textContent=S.company;
  $('s-day').textContent="Tag "+fmt(S.day);
  $('s-cash').textContent=eur(S.cash);
  $('s-net').textContent=eur(netWorth());
  const lv=level();
  $('s-level').textContent=`Stufe ${lv} · ${TITLES[Math.min(lv-1,TITLES.length-1)]}`;
  const cur=LEVELS[lv-1]||0, nxt=LEVELS[lv]||LEVELS[LEVELS.length-1];
  const pct = lv>=LEVELS.length?100:Math.max(0,Math.min(100,(S.xp-cur)/(nxt-cur)*100));
  $('s-lvlbar').style.width=pct+"%";
  $('s-xp').textContent = lv>=LEVELS.length? "max. Stufe" : `${fmt(S.xp)} / ${fmt(nxt)} GP`;
  renderTicker();

  if(S.tab==="betrieb") renderBetrieb();
  else if(S.tab==="markt") renderMarkt();
  else renderKonzern();
}

function renderTicker(){
  let html="";
  for(const g in GOODS){
    const p=S.prices[g], base=GOODS[g].base;
    const diff=(p/base-1)*100;
    const cls=diff>=0?"up":"down", ar=diff>=0?"▲":"▼";
    html+=`<span class="tk"><span class="nm">${GOODS[g].name}</span> ${p.toFixed(1)}€ <span class="${cls}">${ar}${Math.abs(diff).toFixed(0)}%</span></span>`;
  }
  $('ticker').innerHTML = html+html; // doppelt für nahtlosen Lauf
}

function renderBetrieb(){
  const lv=level();
  let h="";
  if(Object.keys(S.buildings).length===0){
    h+=`<div class="hint">Willkommen, Chef. Du startest mit <b>5.000 €</b>. Baue zuerst einen <b>Bauernhof</b> oder <b>Kuhstall</b>, um Rohwaren zu erzeugen — diese verkaufst du dann im <b>Markt</b>. Veredelte Waren (Brot, Käse, Kleidung) bringen deutlich mehr.</div>`;
  }
  h+=`<div class="sect-title">Deine Betriebe</div>`;
  const owned=Object.keys(BUILDINGS).filter(id=>S.buildings[id]>0);
  if(owned.length===0){ h+=`<div class="sub" style="margin:0 2px 14px;color:var(--ink-soft)">Noch keine Betriebe.</div>`; }
  for(const id of owned){
    const b=BUILDINGS[id], cnt=S.buildings[id];
    h+=buildingCard(id,b,cnt,lv,true);
  }
  h+=`<div class="sect-title">Neu bauen</div>`;
  for(const id in BUILDINGS){
    const b=BUILDINGS[id], cnt=S.buildings[id]||0;
    if(cnt>0 && owned.includes(id)) { h+=buildingCard(id,b,cnt,lv,false,true); }
    else h+=buildingCard(id,b,cnt,lv,false);
  }
  $('content').innerHTML=h;
  bindBuild();
}

function buildingCard(id,b,cnt,lv,showOwned,buyMoreOnly){
  const locked=lv<b.unlock;
  const cost=buildCost(id);
  const prod=Object.entries(b.produces).map(([g,n])=>`${n}× ${GOODS[g].ico}${GOODS[g].name}`).join(", ");
  const cons=Object.keys(b.consumes).length?Object.entries(b.consumes).map(([g,n])=>`${n}× ${GOODS[g].name}`).join(", "):null;
  let chain="";
  if(cons) chain=`<div class="chain">${cons} <span class="arr">→</span> ${prod} · pro Tag</div>`;
  else chain=`<div class="chain"><span class="arr">⤷</span> ${prod} · pro Tag</div>`;

  return `<div class="card ${locked?'locked':''}">
    <div class="row">
      <div class="ico">${b.ico}</div>
      <div class="grow">
        <div class="name">${b.name}</div>
        <div class="sub">Unterhalt ${b.upkeep}€/Tag${cnt>0?` · ${cnt} im Besitz`:''}</div>
      </div>
      ${showOwned?`<div class="owned">${cnt}</div>`:''}
    </div>
    ${chain}
    ${ locked
      ? `<div class="btn btn-build" style="background:var(--paper-2);color:var(--loss);cursor:default">🔒 Ab Stufe ${b.unlock}</div>`
      : `<button class="btn btn-build" data-build="${id}" ${S.cash<cost?'disabled':''}>${cnt>0?'Weiteren bauen':'Bauen'}<span class="c">${eur(cost)}</span></button>`
    }
  </div>`;
}

function renderMarkt(){
  let h=`<div class="hint" style="margin-bottom:12px">Verkaufe zum Marktpreis — abzüglich <b>10 % Gebühr</b>. Die Preise schwanken jetzt kräftig: warte auf Hochs zum Verkaufen, nutze Tiefs zum Einkaufen. Dein <b>Lager ist begrenzt</b> (wächst mit der Stufe) — ist es voll, verfällt die Überproduktion.</div>`;
  h+=`<div class="sect-title">Lager & Börse</div>`;
  let any=false;
  for(const g in GOODS){
    const have=S.warehouse[g]||0;
    const p=S.prices[g], base=GOODS[g].base, diff=(p/base-1)*100;
    const cls=diff>=0?"up":"down", ar=diff>=0?"▲":"▼";
    const cap=capacity();
    const fillPct=Math.max(0,Math.min(100, have/cap*100));
    const nearFull = have>=cap*0.9;
    const a=S.auto[g]||{on:false, limit:Math.round(GOODS[g].base*1.4)};
    if(have>0) any=true;
    h+=`<div class="card">
      <div class="mk-head">
        <div class="row" style="gap:9px">
          <div class="ico" style="width:34px;height:34px;font-size:18px">${GOODS[g].ico}</div>
          <div><div class="name" style="font-size:14px">${GOODS[g].name}</div>
          <div class="sub">Lager: <b style="color:${nearFull?'var(--loss)':'var(--ink)'}">${fmt(have)}</b> / ${fmt(cap)}</div></div>
        </div>
        <div style="text-align:right">
          <div class="price">${p.toFixed(1)} €</div>
          <div class="mk-trend ${cls}">${ar} ${Math.abs(diff).toFixed(0)}%</div>
        </div>
      </div>
      <div class="stockbar"><i style="width:${fillPct}%;background:${nearFull?'var(--loss)':'var(--brass)'}"></i></div>
      <div class="trade">
        <button class="btn sell" data-sell="${g}" data-amt="10" ${have<10?'disabled':''}>Verk. 10</button>
        <button class="btn sell" data-sell="${g}" data-amt="100" ${have<100?'disabled':''}>Verk. 100</button>
        <button class="btn sellall" data-sell="${g}" data-amt="all" ${have<=0?'disabled':''}>Alle (${fmt(have)})</button>
        <button class="btn buy" data-buy="${g}" data-amt="100" ${S.cash<p*100?'disabled':''}>Kauf 100</button>
      </div>
      <div class="auto">
        <button class="btn autotgl ${a.on?'on':''}" data-auto="${g}">⚙ Auto-Verkauf ${a.on?'an':'aus'}</button>
        <div class="autolim">ab <button data-adj="${g}" data-d="-1">−</button> <b>${fmt(a.limit)} €</b> <button data-adj="${g}" data-d="1">+</button></div>
      </div>
    </div>`;
  }
  $('content').innerHTML=h;
  bindMarket();
}

function renderKonzern(){
  const lv=level();
  let prod={}, upkeep=0;
  for(const id in BUILDINGS){ const c=S.buildings[id]||0; if(!c)continue; upkeep+=BUILDINGS[id].upkeep*c;
    for(const o in BUILDINGS[id].produces) prod[o]=(prod[o]||0)+BUILDINGS[id].produces[o]*c; }
  const totalB=Object.values(S.buildings).reduce((a,b)=>a+b,0);

  let h=`<div class="sect-title">Übersicht</div>
  <div class="card">
    <div class="row" style="justify-content:space-between"><span class="sub" style="font-size:13px">Konzernwert</span><span class="price" style="color:var(--brass)">${eur(netWorth())}</span></div>
    <div class="row" style="justify-content:space-between;margin-top:6px"><span class="sub" style="font-size:13px">Ziel: Millionär</span><span class="pill">${Math.min(100,Math.round(netWorth()/GOAL*100))}%</span></div>
    <div class="stockbar" style="margin-top:8px"><i style="width:${Math.min(100,netWorth()/GOAL*100)}%"></i></div>
  </div>
  <div class="card"><div class="sub" style="font-size:13px;margin-bottom:8px">Konzernwert-Verlauf</div>${sparkSVG(S.netHist)}</div>
  <div class="card">
    <div class="row" style="justify-content:space-between"><span class="sub" style="font-size:13px">Betriebe gesamt</span><span class="owned" style="font-size:18px">${totalB}</span></div>
    <div class="row" style="justify-content:space-between;margin-top:4px"><span class="sub" style="font-size:13px">Unterhalt pro Tag</span><span class="price" style="color:var(--loss);font-size:14px">${eur(upkeep)}</span></div>
    <div class="row" style="justify-content:space-between;margin-top:4px"><span class="sub" style="font-size:13px">Bilanz Ø/Tag (10 T.)</span><span class="price" style="font-size:14px;color:${avgProfit()>=0?'var(--gain)':'var(--loss)'}">${avgProfit()>=0?'+':'−'}${eur(Math.abs(avgProfit()))}</span></div>
    <div class="chain" style="margin-top:9px">Produktion/Tag: ${Object.keys(prod).length?Object.entries(prod).map(([g,n])=>`${n}× ${GOODS[g].ico}`).join("  "):"—"}</div>
  </div>`;

  h+=`<div class="sect-title">Bank</div>
  <div class="card">
    <div class="row" style="justify-content:space-between"><span class="sub" style="font-size:13px">Schulden</span><span class="price" style="font-size:14px;color:${(S.debt||0)>0?'var(--loss)':'var(--ink-soft)'}">${eur(S.debt||0)}</span></div>
    <div class="row" style="justify-content:space-between;margin-top:4px"><span class="sub" style="font-size:13px">Freier Kreditrahmen</span><span class="price" style="font-size:14px;color:var(--brass)">${eur(Math.max(0,creditLimit()-(S.debt||0)))}</span></div>
    <div class="sub" style="margin-top:7px;font-size:11px">Zins 0,15 % pro Tag auf die offene Summe. Tilgen, sobald es läuft.</div>
    <div class="bankgrid">
      <button class="btn loan" data-loan="10000">Kredit +10.000</button>
      <button class="btn loan" data-loan="50000">Kredit +50.000</button>
      <button class="btn repay" data-repay="10000" ${(S.debt||0)<=0?'disabled':''}>Tilgen 10.000</button>
      <button class="btn repay" data-repay="all" ${(S.debt||0)<=0?'disabled':''}>Alles tilgen</button>
    </div>
  </div>`;

  h+=`<div class="sect-title">Ereignisse</div><div class="card log">`;
  for(const e of S.log.slice(0,14)) h+=`<div class="e ${e.c}"><span class="d">T${fmt(e.day)}</span><span class="t">${e.t}</span></div>`;
  h+=`</div>`;

  h+=`<div class="sect-title">Einstellungen</div>
  <div class="card">
    <div class="field"><label>Name des Konzerns</label><input id="in-company" value="${S.company.replace(/"/g,'&quot;')}" maxlength="28"></div>
    <div class="sub" style="font-size:11px;margin-bottom:10px">${HAS_LS?'Dein Fortschritt wird automatisch auf diesem Gerät gespeichert.':'Auf diesem Gerät kann nicht dauerhaft gespeichert werden.'}</div>
    <button class="btn btn-build" id="b-save" style="margin-top:0">💾 Jetzt speichern</button>
    <button class="btn btn-build" id="b-load" style="background:var(--green-800)">📂 Letzten Stand laden</button>
    <button class="btn danger" id="b-new">Neu beginnen</button>
  </div>`;
  $('content').innerHTML=h;

  $('in-company').addEventListener('change',e=>{ S.company=e.target.value.trim()||"Mein Kontor"; $('s-company').textContent=S.company; persist(); });
  $('b-save').onclick=saveGame;
  $('b-load').onclick=loadGame;
  $('b-new').onclick=()=>{ if(confirm("Neues Spiel starten? Der aktuelle Fortschritt geht verloren.")) newGame(); };
  document.querySelectorAll('[data-loan]').forEach(b=>b.onclick=()=>takeLoan(parseInt(b.dataset.loan)));
  document.querySelectorAll('[data-repay]').forEach(b=>b.onclick=()=>repayLoan(b.dataset.repay==='all'?(S.debt||0):parseInt(b.dataset.repay)));
}

/* ============ BINDINGS ============ */
function bindBuild(){ document.querySelectorAll('[data-build]').forEach(b=>b.onclick=()=>build(b.dataset.build)); }
function bindMarket(){
  document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>sell(b.dataset.sell, b.dataset.amt==='all'?'all':parseInt(b.dataset.amt)));
  document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buy(b.dataset.buy, parseInt(b.dataset.amt)));
  document.querySelectorAll('[data-auto]').forEach(b=>b.onclick=()=>toggleAuto(b.dataset.auto));
  document.querySelectorAll('[data-adj]').forEach(b=>b.onclick=()=>adjAuto(b.dataset.adj, parseInt(b.dataset.d)));
}

/* ============ OVERLAY ============ */
function showOverlay(title,text,btn,cb){
  const o=$('overlay'); o.classList.remove('hidden');
  o.innerHTML=`<h1>${title}</h1><p>${text}</p><button class="btn" id="ov-btn">${btn}</button>`;
  $('ov-btn').onclick=cb;
}
function hideOverlay(){ $('overlay').classList.add('hidden'); if(!S.bankrupt) setPlay(true); }

/* ============ INIT ============ */
const saved=loadSaved();
S = saved ? hydrate(saved) : freshState();
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
$('c-play').onclick=()=>setPlay(true);
$('c-pause').onclick=()=>setPlay(false);
$('c-speed').onclick=cycleSpeed;
$('c-speed').textContent=SPEEDS[S.speedIdx]+"×";
if(saved){ setPlay(false); toast("Fortschritt geladen — auf ▶ tippen."); }
render();
startLoop();
window.addEventListener('beforeunload', persist);
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
