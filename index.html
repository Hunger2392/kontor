<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kontor — Wirtschaftssimulation</title>
<meta name="theme-color" content="#0c3327">
<meta name="description" content="Kontor — baue dein Wirtschaftsimperium auf. Eine Wirtschaftssimulation für den Browser.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kontor">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,800&family=Familjen+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0c3327;
    --green-800:#10402f;
    --green-700:#16513c;
    --green-600:#1d6349;
    --paper:#f2ece0;
    --paper-2:#e7dfce;
    --ink:#16201b;
    --ink-soft:#46584f;
    --brass:#c9a24b;
    --brass-bright:#e3c074;
    --gain:#2c8a55;
    --loss:#bc4334;
    --line:rgba(22,32,27,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Familjen Grotesk',system-ui,sans-serif;
    background:var(--green-900);
    color:var(--ink);
    overflow:hidden;
    position:fixed;width:100%;
  }
  #app{display:flex;flex-direction:column;height:100%;max-width:560px;margin:0 auto;background:var(--paper);position:relative}

  /* ---------- Status bar ---------- */
  .status{
    background:linear-gradient(180deg,var(--green-800),var(--green-900));
    color:var(--paper);
    padding:10px 14px 8px;
    border-bottom:2px solid var(--brass);
    flex:0 0 auto;
  }
  .status-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .company{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.2px;color:var(--brass-bright);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(242,236,224,.6);letter-spacing:1px;text-transform:uppercase}
  .status-grid{display:flex;gap:14px;margin-top:6px;align-items:flex-end}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat .lbl{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(242,236,224,.55);font-weight:600}
  .stat .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--paper)}
  .stat.cash .val{color:var(--brass-bright)}
  .stat.networth .val{font-size:14px}
  .controls{margin-left:auto;display:flex;gap:6px;align-items:center}
  .ctrl{
    background:rgba(242,236,224,.08);border:1px solid rgba(242,236,224,.2);color:var(--paper);
    width:34px;height:30px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.12s;font-family:'JetBrains Mono',monospace;
  }
  .ctrl:active{transform:scale(.92)}
  .ctrl.active{background:var(--brass);border-color:var(--brass);color:var(--green-900)}
  .lvlbar{margin-top:8px;height:5px;border-radius:3px;background:rgba(242,236,224,.14);overflow:hidden}
  .lvlbar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass),var(--brass-bright));transition:width .3s}

  /* ---------- Ticker ---------- */
  .ticker{
    background:var(--green-900);color:var(--paper);overflow:hidden;white-space:nowrap;
    border-bottom:1px solid rgba(201,162,75,.35);flex:0 0 auto;position:relative;
  }
  .ticker-track{display:inline-block;padding:6px 0;animation:scroll 38s linear infinite;font-family:'JetBrains Mono',monospace;font-size:12px}
  .ticker:hover .ticker-track{animation-play-state:paused}
  .ticker .tk{margin:0 18px}
  .ticker .tk .nm{color:rgba(242,236,224,.65)}
  .up{color:#5fc98a}.down{color:#e0796b}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){.ticker-track{animation:none}}

  /* ---------- Content ---------- */
  .content{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}
  .sect-title{font-family:'Fraunces',serif;font-weight:600;font-size:13px;letter-spacing:.4px;color:var(--ink);
    margin:2px 2px 10px;display:flex;align-items:center;gap:8px}
  .sect-title::after{content:"";flex:1;height:1px;background:var(--line)}
  .hint{background:var(--paper-2);border:1px dashed var(--brass);border-radius:10px;padding:12px 14px;font-size:13px;
    color:var(--ink-soft);line-height:1.4;margin-bottom:14px}
  .hint b{color:var(--ink)}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;
    box-shadow:0 1px 0 rgba(22,32,27,.04)}
  .row{display:flex;align-items:center;gap:11px}
  .ico{width:42px;height:42px;border-radius:10px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;
    font-size:22px;flex:0 0 auto}
  .grow{flex:1;min-width:0}
  .name{font-weight:600;font-size:14.5px;color:var(--ink)}
  .sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px;font-family:'JetBrains Mono',monospace}
  .pill{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;
    background:var(--paper-2);color:var(--ink-soft)}
  .owned{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--brass);min-width:26px;text-align:right}

  .btn{border:none;border-radius:9px;font-family:'Familjen Grotesk',sans-serif;font-weight:600;cursor:pointer;
    transition:.12s;font-size:13px;padding:9px 12px;white-space:nowrap}
  .btn:active{transform:scale(.95)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-build{background:var(--green-700);color:var(--paper);width:100%;margin-top:10px;font-size:13.5px}
  .btn-build .c{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--brass-bright);margin-left:6px}
  .locked{opacity:.55;filter:grayscale(.4)}
  .lock-tag{font-size:11px;color:var(--loss);font-weight:600;font-family:'JetBrains Mono',monospace}

  .chain{font-size:11px;color:var(--ink-soft);margin-top:7px;background:var(--paper);border-radius:7px;padding:6px 8px;
    font-family:'JetBrains Mono',monospace}
  .chain .arr{color:var(--brass);font-weight:700}

  /* market */
  .mk-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .price{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px}
  .mk-trend{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
  .trade{display:flex;gap:6px;margin-top:10px}
  .trade .btn{flex:1;padding:8px 4px;font-size:12px}
  .sell{background:var(--gain);color:#fff}
  .sellall{background:var(--green-800);color:#fff}
  .buy{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .stockbar{height:4px;border-radius:2px;background:var(--paper-2);margin-top:8px;overflow:hidden}
  .stockbar i{display:block;height:100%;background:var(--brass)}
  .auto{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
  .autotgl{background:var(--paper-2);color:var(--ink-soft);padding:7px 11px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-family:inherit}
  .autotgl.on{background:var(--gain);color:#fff}
  .autolim{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .autolim b{color:var(--ink)}
  .autolim button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer;font-size:15px;color:var(--ink);line-height:1}
  .bankgrid{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .bankgrid .btn{flex:1;min-width:calc(50% - 3px);padding:9px 4px;font-size:12.5px}
  .loan{background:var(--green-700);color:#fff}
  .repay{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .spark{width:100%;height:66px;display:block}
  .spark polyline{fill:none;stroke:var(--brass);stroke-width:2;vector-effect:non-scaling-stroke}
  .spark .area{fill:rgba(201,162,75,.13);stroke:none}
  .linkbtn{background:none;border:none;color:var(--green-700);font-weight:700;font-family:inherit;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
  .linkbtn:disabled{color:var(--ink-soft);text-decoration:none;opacity:.6}
  .banner{display:flex;justify-content:space-around;gap:6px;background:var(--green-800);color:var(--paper);
    border-radius:9px;padding:7px 10px;margin-bottom:10px;font-size:11.5px;font-weight:600;font-family:'JetBrains Mono',monospace}
  .banner.warn{background:var(--loss);color:#fff;justify-content:center}
  .prodbar{display:flex;align-items:center;gap:8px;overflow-x:auto;background:#fff;border:1px solid var(--line);
    border-radius:9px;padding:8px 10px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
  .prodbar::-webkit-scrollbar{display:none}
  .pf-lbl{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);font-weight:700;flex:0 0 auto}
  .pf{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;flex:0 0 auto;white-space:nowrap}
  .pf-up{color:var(--gain)}
  .pf-down{color:var(--loss)}
  .tab .tl{font-size:9.5px}

  /* log */
  .log{font-size:12.5px;line-height:1.5}
  .log .e{padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:8px}
  .log .e .d{font-family:'JetBrains Mono',monospace;color:var(--brass);flex:0 0 auto;font-size:11px;padding-top:1px}
  .log .e.good .t{color:var(--gain)}
  .log .e.bad .t{color:var(--loss)}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .field label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .field input{font-family:'Fraunces',serif;font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  .danger{background:var(--loss);color:#fff;width:100%;margin-top:6px}

  /* ---------- Tab bar ---------- */
  .tabs{position:absolute;left:0;right:0;bottom:0;display:flex;background:var(--green-900);
    border-top:2px solid var(--brass);max-width:560px;margin:0 auto}
  .tab{flex:1;background:none;border:none;color:rgba(242,236,224,.5);padding:9px 4px 11px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;transition:.12s}
  .tab .ic{font-size:18px}
  .tab .tl{font-size:10px;letter-spacing:.5px;font-weight:600}
  .tab.active{color:var(--brass-bright)}

  /* overlay */
  .overlay{position:absolute;inset:0;background:rgba(12,51,39,.94);z-index:30;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--paper)}
  .overlay h1{font-family:'Fraunces',serif;font-weight:800;font-size:30px;color:var(--brass-bright);margin-bottom:10px;line-height:1.1}
  .overlay p{font-size:14px;color:rgba(242,236,224,.8);max-width:340px;line-height:1.5;margin-bottom:22px}
  .overlay .btn{background:var(--brass);color:var(--green-900);font-size:15px;padding:13px 28px}
  .toast{position:absolute;left:50%;transform:translateX(-50%);bottom:78px;background:var(--green-800);
    color:var(--paper);border:1px solid var(--brass);padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;
    z-index:20;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .toast.show{opacity:1}
  .hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <!-- STATUS -->
  <div class="status">
    <div class="status-top">
      <div class="company" id="s-company">Mein Kontor</div>
      <div class="day" id="s-day">Tag 1</div>
    </div>
    <div class="status-grid">
      <div class="stat cash"><span class="lbl">Kapital</span><span class="val" id="s-cash">5.000 €</span></div>
      <div class="stat networth"><span class="lbl">Konzernwert</span><span class="val" id="s-net">5.000 €</span></div>
      <div class="controls">
        <button class="ctrl" id="c-pause" title="Pause">❚❚</button>
        <button class="ctrl active" id="c-play" title="Start">▶</button>
        <button class="ctrl" id="c-speed" title="Geschwindigkeit">1×</button>
      </div>
    </div>
    <div class="status-top" style="margin-top:8px">
      <div class="day" id="s-level">Stufe 1 · Kleinhändler</div>
      <div class="day" id="s-xp"></div>
    </div>
    <div class="lvlbar"><i id="s-lvlbar" style="width:0%"></i></div>
  </div>

  <!-- TICKER -->
  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="betrieb"><span class="ic">🏭</span><span class="tl">Betrieb</span></button>
    <button class="tab" data-tab="markt"><span class="ic">📈</span><span class="tl">Markt</span></button>
    <button class="tab" data-tab="kette"><span class="ic">🔗</span><span class="tl">Kette</span></button>
    <button class="tab" data-tab="labor"><span class="ic">🔬</span><span class="tl">Labor</span></button>
    <button class="tab" data-tab="handel"><span class="ic">🤝</span><span class="tl">Handel</span></button>
    <button class="tab" data-tab="konzern"><span class="ic">📊</span><span class="tl">Konzern</span></button>
  </div>

  <!-- OVERLAY -->
  <div class="overlay hidden" id="overlay"></div>
</div>

<script>
/* ============ KONFIGURATION ============ */
const GOODS = {
  weizen:   {name:"Weizen",   base:3,  ico:"🌾", demand:16, cogs:0.55, perish:true,  season:[1.05,1.10,1.00,0.90]},
  milch:    {name:"Milch",    base:5,  ico:"🥛", demand:13, cogs:0.80, perish:true,  season:[1.10,1.05,1.00,0.95]},
  stoff:    {name:"Stoff",    base:6,  ico:"🧵", demand:13, cogs:0.75, perish:true,  season:[1.00,0.95,1.10,1.05]},
  mehl:     {name:"Mehl",     base:9,  ico:"🥣", demand:11, cogs:1.90, perish:false, season:[1.00,1.05,1.05,1.00]},
  brot:     {name:"Brot",     base:28, ico:"🍞", demand:8,  cogs:5.20, perish:false, season:[0.95,0.90,1.05,1.30]},
  kaese:    {name:"Käse",     base:22, ico:"🧀", demand:7,  cogs:4.10, perish:false, season:[1.00,1.00,1.10,1.15]},
  kleidung: {name:"Kleidung", base:35, ico:"👕", demand:6,  cogs:6.80, perish:false, season:[0.90,0.85,1.35,1.20]},
  holz:     {name:"Holz",     base:16, ico:"🪵", demand:6,  cogs:3.00, perish:false},
  moebel:   {name:"Möbel",    base:90, ico:"🪑", demand:4,  cogs:14.0, perish:false},
  eisen:    {name:"Eisen",    base:20, ico:"🪨", demand:6,  cogs:4.00, perish:false},
  werkzeug: {name:"Werkzeug", base:110,ico:"🔧", demand:3,  cogs:16.0, perish:false},
};

const BUILDINGS = {
  bauernhof:   {name:"Bauernhof",   ico:"🚜", unlock:1, cost:1200,  upkeep:10, produces:{weizen:8}, consumes:{}},
  kuhstall:    {name:"Kuhstall",    ico:"🐄", unlock:1, cost:1600,  upkeep:15, produces:{milch:6},  consumes:{}},
  weberei:     {name:"Baumwollfeld",ico:"🌿", unlock:2, cost:2500,  upkeep:18, produces:{stoff:6},  consumes:{}},
  muehle:      {name:"Mühle",       ico:"⚙️", unlock:3, cost:4000,  upkeep:25, produces:{mehl:6},   consumes:{weizen:6}},
  baeckerei:   {name:"Bäckerei",    ico:"🥖", unlock:4, cost:9000,  upkeep:40, produces:{brot:5},   consumes:{mehl:6}},
  kaeserei:    {name:"Käserei",     ico:"🧀", unlock:4, cost:8000,  upkeep:35, produces:{kaese:4},  consumes:{milch:6}},
  schneiderei: {name:"Schneiderei", ico:"✂️", unlock:5, cost:11000, upkeep:45, produces:{kleidung:4},consumes:{stoff:6}},
  forst:       {name:"Forst",        ico:"🌲", unlock:6, cost:14000, upkeep:35, produces:{holz:6},    consumes:{}},
  schreinerei: {name:"Schreinerei",  ico:"🪚", unlock:6, cost:24000, upkeep:55, produces:{moebel:3},  consumes:{holz:6}},
  eisenmine:   {name:"Eisenmine",    ico:"⛏️", unlock:7, cost:18000, upkeep:40, produces:{eisen:6},   consumes:{}},
  schmiede:    {name:"Schmiede",     ico:"🔨", unlock:7, cost:30000, upkeep:60, produces:{werkzeug:3},consumes:{eisen:6}},
};

const TITLES = ["Kleinhändler","Krämer","Kaufmann","Fabrikant","Großhändler","Industrieller","Magnat","Tycoon","Imperator","Mogul","Großindustrieller","Wirtschaftsfürst","Krösus"];
const LEVELS = [0, 4000, 12000, 30000, 80000, 200000, 500000, 1200000, 3000000, 7000000, 16000000, 40000000, 100000000];
const PRODUCER = {};
for(const _id in BUILDINGS){ for(const _g in BUILDINGS[_id].produces){ PRODUCER[_g]=_id; } }
const GOAL = 1000000;
const SPEEDS = [1,2,4];
const BASE_TICK = 2600;            // ms pro Tag bei 1× (vorher 1000) — Tage vergehen langsamer
const CAP_BASE = 700, CAP_PER_LEVEL = 700; // Lagerkapazität je Ware, wächst mit der Stufe
const SEASON_NAMES = ["Frühling","Sommer","Herbst","Winter"];
const SEASON_ICO = ["🌱","☀️","🍂","❄️"];
const SEASON_LEN = 30, YEAR_LEN = 120;
const TAX_RATE = 0.25, QUARTER = 30;     // Steuer pro Quartal
const AGRI = ["bauernhof","kuhstall","weberei"]; // wetterabhängige Betriebe
const STOCKS = {
  globex:  {name:"Globex Industrie", base:100},
  helvet:  {name:"Helvetia Bank",    base:60},
  novum:   {name:"Novum Energie",    base:145},
};

/* ============ ZUSTAND ============ */
let S;
function freshState(name, prestige){
  prestige = prestige||0;
  const prices = {};
  for(const g in GOODS) prices[g] = GOODS[g].base;
  const stockP = {};
  for(const s in STOCKS) stockP[s] = STOCKS[s].base;
  return {
    company: name || "Mein Kontor",
    cash: Math.round(5000*(1+0.5*prestige)), day: 1, xp: 0, totalInvested: 0,
    buildings: {}, warehouse: {}, prices,
    running: true, speedIdx: 0, tab:"betrieb",
    log: [{day:1, t:"Kontor eröffnet. Baue deinen ersten Betrieb.", c:""}],
    won:false, bankrupt:false, cashHist:[5000],
    debt:0, auto:{}, netHist:[],
    sell:{}, q:{}, research:null, autoSell:{},
    pop: Math.round(1000*(1+0.15*prestige)),  // Bevölkerung → Nachfrage
    marketMult: 1,                            // Marktausbau
    bLvl: {},                                 // Gebäude-Ausbaustufen
    wage: 1.0, strikeDays: 0,                 // Löhne & Streik
    qProfit: 0, lastTax: 0,                   // Steuer
    stk: {}, stockP,                          // Aktien
    contracts: [], contractOffer: null,       // Exportaufträge
    reputation: 100,                          // Ruf (Schwarzmarkt)
    weather: {type:'', factor:1, days:0},     // Wetter
    pendingNews: [], demandBoost: {},         // Nachrichten mit Vorlauf
    treasury: 0,                              // Konzern-Fonds (passives Einkommen)
    soldUnits: {}, soldRev: {},                // kumulierte Verkaufsstatistik
    ipo: {public:false, floatPct:0, price:0, mcapHist:[], takeover:null, cooldown:0, paidDiv:0, raised:0},
    prestige: prestige,
  };
}

/* ============ HILFEN ============ */
const $ = id => document.getElementById(id);
const fmt = n => Math.round(n).toLocaleString('de-DE');
const eur = n => fmt(n)+" €";
function level(){ let l=1; for(let i=1;i<LEVELS.length;i++) if(S.xp>=LEVELS[i]) l=i+1; return l; }
function capacity(){ return CAP_BASE + (level()-1)*CAP_PER_LEVEL; }
function avgProfit(){ const h=S.cashHist; if(h.length<2) return 0; return (h[h.length-1]-h[0])/(h.length-1); }
function quality(g){ return S.q[g]||0; }
let MKT_ALL = false;                                  // Markt-Filter: nur eigene Waren / alle
let UTIL = {};                                        // Auslastung je Betrieb (in renderBetrieb gesetzt)
function ownsProducer(g){ const pid=PRODUCER[g]; return !!(pid && (S.buildings[pid]||0)>0); }
function effRef(g){ return S.prices[g]*(1+0.12*quality(g)); }            // Q hebt den erzielbaren Preis
function ensureOffer(g){ if(!S.sell[g]) S.sell[g]={price:Math.max(1,Math.round(effRef(g))), on:true}; return S.sell[g]; }
/* --- Saison, Konjunktur, Bevölkerung --- */
function season(){ return Math.floor((S.day % YEAR_LEN)/SEASON_LEN); }
function seasonFactor(g){ const s=GOODS[g].season; return s?s[season()]:1; }
function cycle(){ // Konjunkturzyklus ~100 Tage
  const phase=Math.sin(2*Math.PI*S.day/100);
  const factor=1+0.18*phase;
  let name="Stabil";
  if(phase>0.5) name="Hochkonjunktur"; else if(phase>0.05) name="Aufschwung";
  else if(phase<-0.5) name="Rezession"; else if(phase<-0.05) name="Abschwung";
  return {factor, name, phase};
}
function popFactor(){ return S.pop/1000; }
function demandNow(g){
  const boost=S.demandBoost[g]?S.demandBoost[g].factor:1;
  return GOODS[g].demand * popFactor() * seasonFactor(g) * cycle().factor * boost * (S.marketMult||1);
}
/* --- Gebäude-Ausbau & Löhne --- */
function bLvl(id){ return S.bLvl[id]||0; }
function outMult(id){ return 1 + 0.25*bLvl(id); }                 // +25% Output je Stufe
function upMult(id){ return Math.max(0.6, 1 - 0.06*bLvl(id)); }   // günstigerer Unterhalt je Stufe
function cogsMult(id){ return Math.max(0.6, 1 - 0.05*bLvl(id)); } // günstigere Herstellung je Stufe
function upgradeCost(id){ return Math.round(BUILDINGS[id].cost*1.6*Math.pow(1.8, bLvl(id)+1)); }
function wageProd(){ return 0.7 + 0.3*S.wage; }                   // Wage 1.0 → 1.0 Produktivität
function chainGoodsFor(g){ // lineare Kette: Rohstoff-Wurzel → Endprodukt
  let root=g, guard=0;
  while(guard++<10){ const pid=PRODUCER[root]; const b=pid&&BUILDINGS[pid]; const ins=b?Object.keys(b.consumes||{}):[]; if(!ins.length) break; root=ins[0]; }
  const path=[root]; let cur=root; guard=0;
  while(guard++<10){ let nx=null; for(const id in BUILDINGS){ const b=BUILDINGS[id]; if(b.consumes&&b.consumes[cur]){ nx=Object.keys(b.produces)[0]; break; } } if(!nx) break; path.push(nx); cur=nx; }
  return path;
}
function integrationBonus(id){ // ganze Kette im Besitz → +15 % Output
  const prod=Object.keys(BUILDINGS[id].produces); if(!prod.length) return 1;
  const path=chainGoodsFor(prod[0]); if(path.length<2) return 1;
  for(const gg of path){ const pid=PRODUCER[gg]; if(!pid||(S.buildings[pid]||0)<=0) return 1; }
  return 1.15;
}
function effFactor(id){ // tatsächlicher Output-Faktor inkl. Ausbau, Löhne, Wetter, Integration
  let f = outMult(id)*wageProd()*integrationBonus(id);
  if(AGRI.includes(id) && S.weather.days>0) f *= S.weather.factor;
  if(S.strikeDays>0) f = 0;
  return f;
}
function dailyOutput(){ // Realistischer Netto-Fluss/Tag: simuliert eine Produktionsrunde mit Vorprodukt-Begrenzung
  const out={};
  const sim={}; for(const g in GOODS) sim[g]=S.warehouse[g]||0;   // aktueller Lagerstand als Basis
  for(const id in BUILDINGS){ const cnt=S.buildings[id]||0; if(!cnt) continue;   // gleiche Reihenfolge wie tick(): Rohstoff → Endprodukt
    const b=BUILDINGS[id];
    let active=cnt;
    for(const inp in b.consumes) active=Math.min(active, Math.floor((sim[inp]||0)/b.consumes[inp]));
    if(active<=0) continue;
    for(const inp in b.consumes){ sim[inp]-=b.consumes[inp]*active; out[inp]=(out[inp]||0)-b.consumes[inp]*active; }
    const f=effFactor(id);
    for(const g in b.produces){ const add=Math.round(b.produces[g]*active*f); sim[g]=(sim[g]||0)+add; out[g]=(out[g]||0)+add; }
  }
  return out;
}
function buildingUtil(){ // wie viele Einheiten je Gebäude tatsächlich laufen (durch Input begrenzt)
  const sim={}; for(const g in GOODS) sim[g]=S.warehouse[g]||0;
  const res={};
  for(const id in BUILDINGS){ const cnt=S.buildings[id]||0; if(!cnt) continue;
    const b=BUILDINGS[id];
    let active=cnt, lim=null, minCan=Infinity;
    for(const inp in b.consumes){ const can=Math.floor((sim[inp]||0)/b.consumes[inp]); if(can<minCan){ minCan=can; lim=inp; } }
    if(lim!==null) active=Math.max(0, Math.min(cnt, minCan));
    if(active>0){
      for(const inp in b.consumes) sim[inp]-=b.consumes[inp]*active;
      const f=effFactor(id);
      for(const g in b.produces) sim[g]=(sim[g]||0)+Math.round(b.produces[g]*active*f);
    }
    res[id]={active, cnt, lim:(active<cnt?lim:null)};
  }
  return res;
}
function prodBar(){  const flow=dailyOutput();
  const keys=Object.keys(GOODS).filter(g=>flow[g]!==undefined && flow[g]!==0);
  if(keys.length===0) return '';
  let inner=keys.map(g=>{
    const v=flow[g], cls=v>=0?'pf-up':'pf-down';
    return `<span class="pf ${cls}">${GOODS[g].ico} ${GOODS[g].name} ${v>=0?'+':''}${fmt(v)}</span>`;
  }).join('');
  return `<div class="prodbar"><span class="pf-lbl">Netto/Tag</span>${inner}</div>`;
}
function costFactor(id){ return outMult(id)*wageProd(); }   // Ausbau + Löhne (ohne Wetter/Streik, für stabile Kosten)
function fullCost(g, seen){
  const id=PRODUCER[g];
  if(!id) return GOODS[g].cogs||0;
  seen=seen||{}; if(seen[g]) return GOODS[g].cogs||0; seen[g]=true;  // Zyklusschutz
  const b=BUILDINGS[id];
  const perBuild=b.produces[g]*costFactor(id);
  if(perBuild<=0) return GOODS[g].cogs||0;
  let c = GOODS[g].cogs*cogsMult(id);                       // direkte Herstellung
  c += (b.upkeep*upMult(id)*S.wage)/perBuild;               // anteiliger Unterhalt/Löhne
  for(const inp in b.consumes) c += (b.consumes[inp]/perBuild)*fullCost(inp, seen); // Vorprodukte
  return c;
}
function predictSales(g, price){ const er=effRef(g); if(price>=er*2.5) return 0; const r=er/price; return Math.round(demandNow(g)*Math.min(4, Math.pow(r,1.8))); }
function researchCost(g){ return Math.round(GOODS[g].base*180*Math.pow(2.2, quality(g))); }
function researchTime(g){ return Math.round(18*Math.pow(1.6, quality(g))); }  // in Tagen/Ticks
function buildCost(id){ const owned=S.buildings[id]||0; return Math.round(BUILDINGS[id].cost*Math.pow(1.6,owned)); }
function netWorth(){
  let n = S.cash + S.totalInvested*0.5 - (S.debt||0) + (S.treasury||0);
  for(const g in S.warehouse) n += (S.warehouse[g]||0)*S.prices[g];
  for(const s in (S.stk||{})) n += (S.stk[s]||0)*(S.stockP[s]||0);
  return n;
}
function assetsValue(){ return netWorth() + (S.debt||0); }
function creditLimit(){ return Math.max(10000, Math.round(assetsValue()*0.5)); }
function sparkSVG(data){
  if(!data || data.length<2) return `<div class="sub" style="color:var(--ink-soft)">Noch nicht genug Daten — spiel ein paar Tage.</div>`;
  const w=300,h=66,pad=4, min=Math.min(...data), max=Math.max(...data), range=(max-min)||1;
  const pts=data.map((v,i)=>{ const x=pad+i/(data.length-1)*(w-2*pad); const y=h-pad-((v-min)/range)*(h-2*pad); return x.toFixed(1)+','+y.toFixed(1); });
  const area=`${pad},${h-pad} `+pts.join(' ')+` ${(w-pad)},${h-pad}`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polygon class="area" points="${area}"/><polyline points="${pts.join(' ')}"/></svg>`;
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }
function addLog(t,c){ S.log.unshift({day:S.day,t,c}); if(S.log.length>40) S.log.pop(); }

/* ============ SPIELSCHLEIFE ============ */
let loop=null;
function startLoop(){
  if(loop) clearInterval(loop);
  if(!S.running) return;
  loop = setInterval(tick, BASE_TICK/SPEEDS[S.speedIdx]);
}
function tick(){
  S.day++;
  let upkeepTotal=0, cogsAll=0, overflow=false;
  const cap=capacity();
  const wp=wageProd();
  const onStrike = S.strikeDays>0;

  // Produktion (außer bei Streik)
  if(!onStrike){
    for(const id in BUILDINGS){
      const cnt = S.buildings[id]||0; if(!cnt) continue;
      const b = BUILDINGS[id];
      let active = cnt;
      for(const inp in b.consumes){
        const have = S.warehouse[inp]||0;
        active = Math.min(active, Math.floor(have/b.consumes[inp]));
      }
      if(active<=0){ upkeepTotal += b.upkeep*cnt*upMult(id)*S.wage*0.3; continue; } // Leerlauf-Grundkosten
      for(const inp in b.consumes) S.warehouse[inp] -= b.consumes[inp]*active;
      // Output-Faktoren zentral über effFactor (Ausbau × Löhne × Integration × Wetter)
      let factor = effFactor(id);
      let cogsTotal=0;
      for(const out in b.produces){
        const cur=S.warehouse[out]||0, add=Math.round(b.produces[out]*active*factor);
        cogsTotal += GOODS[out].cogs * cogsMult(id) * add;
        if(cur+add>cap){ S.warehouse[out]=cap; overflow=true; }
        else S.warehouse[out]=cur+add;
      }
      upkeepTotal += b.upkeep*active*upMult(id)*S.wage;  // Lohnkosten skalieren mit Wage
      cogsAll += cogsTotal;
    }
  } else {
    S.strikeDays--;
    if(S.strikeDays===0) addLog("Streik beendet — die Produktion läuft wieder.","good");
  }
  S.cash -= upkeepTotal + cogsAll;
  if(overflow && S.day%6===0) addLog("Lager voll — Überschuss verfällt. Verkaufen oder ausbauen.","bad");

  // Streikrisiko bei zu niedrigen Löhnen
  if(!onStrike && S.wage<0.85 && Math.random()<0.03*(0.85-S.wage)*10){
    S.strikeDays=Math.ceil(2+Math.random()*4);
    addLog(`Streik! Zu niedrige Löhne — ${S.strikeDays} Tage Produktionsausfall.`,"bad"); toast("✊ Streik!");
  }

  // Verderb von Rohwaren
  for(const g in GOODS){ if(GOODS[g].perish){ const h=S.warehouse[g]||0; if(h>20){ S.warehouse[g]=Math.floor(h*0.97); } } }

  // Einzelhandelsverkauf nach Elastizität + endogene Referenzpreise
  const dayRevenue = retailTick();

  // Quartalsbilanz für Steuer
  S.qProfit += dayRevenue - upkeepTotal - cogsAll;

  // Exportaufträge erfüllen / Angebot erzeugen
  contractsTick();

  // Aktienkurse bewegen
  for(const s in STOCKS){ const base=STOCKS[s].base; let p=S.stockP[s]; p+=(base-p)*0.015+base*0.03*(Math.random()*2-1); S.stockP[s]=Math.max(base*0.2,p); }
  // Konzern-Fonds: täglicher Ertrag, konjunkturabhängig
  if((S.treasury||0)>0){ S.treasury += S.treasury * (0.0009*Math.max(0.5, cycle().factor)); }

  // Nachrichten mit Vorlauf abarbeiten
  newsTick();

  // Wetter
  weatherTick();

  // Bevölkerungswachstum (mehr bei Hochkonjunktur)
  S.pop *= 1 + 0.0022*Math.max(0.3, cycle().factor);

  // Zufalls-Preisschocks
  if(Math.random()<0.05){
    const keys=Object.keys(GOODS); const g=keys[Math.floor(Math.random()*keys.length)];
    if(Math.random()<0.5){ S.prices[g]*=1.6; }
    else{ S.prices[g]*=0.6; }
    S.prices[g]=Math.max(GOODS[g].base*0.25,Math.min(GOODS[g].base*4.5,S.prices[g]));
  }

  // Forschung abschließen
  if(S.research && S.day>=S.research.endDay){
    const g=S.research.good; S.q[g]=quality(g)+1;
    addLog(`Forschung abgeschlossen: ${GOODS[g].name} jetzt Q${S.q[g]}.`,"good"); toast(`🔬 ${GOODS[g].name} Q${S.q[g]}`);
    S.research=null;
  }

  // Eigener Aktienkurs & Übernahmeangebote
  if(S.ipo.public){
    const target=companyValuation()/SHARES_TOTAL;
    S.ipo.price += (target-S.ipo.price)*0.06 + S.ipo.price*0.025*(Math.random()*2-1);
    if(S.ipo.price<0.01) S.ipo.price=0.01;
    S.ipo.mcapHist.push(Math.round(marketCap())); if(S.ipo.mcapHist.length>60) S.ipo.mcapHist.shift();
    if(S.ipo.cooldown>0) S.ipo.cooldown--;
    // Übernahmeangebot, wenn Streubesitz hoch und Konzern wertvoll
    if(!S.ipo.takeover && S.ipo.cooldown===0 && S.ipo.floatPct>=0.35 && Math.random()<0.025){
      const premium=1.3+Math.random()*0.5;
      S.ipo.takeover={premium, value:Math.round(companyValuation()*premium)};
      addLog(`Übernahmeangebot: Investor bietet ${eur(S.ipo.takeover.value)} (+${Math.round((premium-1)*100)} %). Im Konzern-Tab entscheiden.`,"good"); toast("🤝 Übernahmeangebot!");
    }
  }

  // Steuer am Quartalsende
  if(S.day % QUARTER === 0){
    const afa = S.totalInvested*0.04;          // Abschreibung mindert Steuerlast
    const taxable = Math.max(0, S.qProfit - afa);
    const tax = Math.round(TAX_RATE*taxable);
    if(tax>0){ S.cash-=tax; S.lastTax=tax; addLog(`Quartalssteuer fällig: ${eur(tax)} (25 % auf ${eur(taxable)} nach AfA).`,"bad"); }
    else { S.lastTax=0; }
    // Dividende an die Aktionäre (Streubesitz-Anteil von 30 % des Quartalsgewinns)
    if(S.ipo.public && S.ipo.floatPct>0){
      const div=Math.round(Math.max(0,S.qProfit-tax)*0.30*S.ipo.floatPct);
      if(div>0){ S.cash-=div; S.ipo.paidDiv=(S.ipo.paidDiv||0)+div; addLog(`Dividende ausgeschüttet: ${eur(div)} an Aktionäre (${Math.round(S.ipo.floatPct*100)} % Streubesitz).`,"bad"); }
      else { S.ipo.price*=0.96; addLog("Kein Gewinn — keine Dividende. Aktienkurs gibt nach.","bad"); }
    }
    S.qProfit=0;
  }

  // Kreditzinsen
  if(S.debt>0) S.debt += S.debt*0.0015;

  // Insolvenz / Sieg
  if(netWorth() < -15000 && !S.bankrupt){ S.bankrupt=true; S.running=false; clearInterval(loop); showOverlay("Insolvenz","Dein Konzern ist überschuldet. Die Gläubiger übernehmen das Ruder.","Neu gründen",()=>newGame()); }
  if(!S.won && netWorth()>=GOAL){ S.won=true; addLog("Konzernwert über 1.000.000 € — Millionär!","good"); showOverlay("Millionär!","Dein Konzernwert hat die Million geknackt. Du kannst weiterspielen oder im Konzern-Tab verkaufen (Exit) und mit Bonus neu starten.","Weiterspielen",()=>hideOverlay()); }

  S.cashHist.push(S.cash); if(S.cashHist.length>11) S.cashHist.shift();
  S.netHist.push(Math.round(netWorth())); if(S.netHist.length>60) S.netHist.shift();
  persist();
  render();
}
function recordSale(g, qty, rev){ S.soldUnits[g]=(S.soldUnits[g]||0)+qty; S.soldRev[g]=(S.soldRev[g]||0)+rev; }
function retailTick(){
  let dayRevenue=0;
  for(const g in GOODS){
    const base=GOODS[g].base;
    let have=S.warehouse[g]||0;
    let off=S.sell[g];
    if(!off && have>0) off=ensureOffer(g);
    // Auto-Verkauf: Preis = Richtpreis + Aufschlag; Mindestmenge bleibt im Lager
    const as=S.autoSell[g];
    const keep=(as && as.on) ? (as.keep||0) : 0;
    if(as && as.on){
      if(!off) off=ensureOffer(g);
      off.price=Math.max(1, Math.round(effRef(g))+(as.markup||0));
      off.on=true;
    }
    let soldVol=0;
    if(off && off.on && have>keep){
      const want=predictSales(g, off.price);
      const sellable=Math.max(0, have-keep);
      const sold=Math.min(want, sellable);
      if(sold>0){ const rev=sold*off.price*0.9; S.warehouse[g]-=sold; S.cash+=rev; S.xp+=rev; dayRevenue+=rev; soldVol=sold; recordSale(g,sold,rev); }
    }
    // Überlauf-Schutz: bei fast vollem Lager Überschuss über der Mindestmenge zum Richtpreis abstoßen
    if(as && as.on && (S.warehouse[g]||0)>=capacity()*0.95){
      const ref=Math.max(1, Math.round(effRef(g)));
      const dumpQty=Math.max(0, (S.warehouse[g]||0)-keep);
      if(dumpQty>0){ const rev=dumpQty*ref*0.9; S.warehouse[g]-=dumpQty; S.cash+=rev; S.xp+=rev; dayRevenue+=rev; soldVol+=dumpQty; recordSale(g,dumpQty,rev); }
    }
    // Endogener Referenzpreis — lebhaftere Bewegung
    let p=S.prices[g];
    const over=soldVol - demandNow(g);
    if(over>0){ p += -over*(base*0.010) + (base-p)*0.03; }      // Überangebot drückt stärker
    else { p += (base-p)*0.08; }                                // schnellere Rückkehr zum Basispreis
    p += base*0.04*(Math.random()*2-1);                          // spürbares Rauschen
    S.prices[g]=Math.max(base*0.25, Math.min(base*4.5, p));
  }
  return dayRevenue;
}
function contractsTick(){
  // aktive Verträge erfüllen
  for(const c of S.contracts){
    if(c.done) continue;
    const have=S.warehouse[c.good]||0;
    const need=c.qty-c.filled;
    const give=Math.min(have, need);
    if(give>0){ S.warehouse[c.good]-=give; c.filled+=give; const rev=give*c.price; S.cash+=rev; S.xp+=rev; }
    if(c.filled>=c.qty){ c.done=true; S.reputation=Math.min(100,S.reputation+4); addLog(`Auftrag erfüllt: ${c.qty}× ${GOODS[c.good].name} geliefert.`,"good"); }
  }
  // abgelaufene Verträge
  for(const c of S.contracts){
    if(!c.done && S.day>=c.deadline){ c.done=true; c.failed=true; S.reputation=Math.max(0,S.reputation-12); addLog(`Auftrag geplatzt: ${GOODS[c.good].name} nicht rechtzeitig geliefert. Ruf −12.`,"bad"); }
  }
  S.contracts = S.contracts.filter(c=>!c.done || (S.day - c.deadline) < 6);
  // neues Angebot generieren
  if(!S.contractOffer && S.contracts.filter(c=>!c.done).length<3 && Math.random()<0.06){
    const keys=Object.keys(GOODS); const g=keys[Math.floor(Math.random()*keys.length)];
    const qty=Math.round((50+Math.random()*200)*popFactor());
    const premium=1.05+Math.random()*0.25+(S.reputation/100)*0.1;
    const price=+(effRef(g)*premium).toFixed(2);
    const days=Math.round(12+Math.random()*14);
    S.contractOffer={good:g, qty, price, days};
  }
}
function newsTick(){
  // fällige Nachrichten aktivieren
  for(const n of S.pendingNews){ if(!n.fired && S.day>=n.day){ n.fired=true; S.demandBoost[n.good]={factor:n.factor, days:n.dur}; addLog(`${n.text} — jetzt aktiv.`, n.factor>=1?"good":"bad"); } }
  S.pendingNews = S.pendingNews.filter(n=>!n.fired);
  // Nachfrageboost abklingen
  for(const g in S.demandBoost){ S.demandBoost[g].days--; if(S.demandBoost[g].days<=0) delete S.demandBoost[g]; }
  // neue Vorab-Nachricht
  if(S.pendingNews.length<2 && Math.random()<0.05){
    const keys=Object.keys(GOODS); const g=keys[Math.floor(Math.random()*keys.length)];
    const up=Math.random()<0.6;
    const factor=up?1.4+Math.random()*0.4:0.6+Math.random()*0.2;
    const lead=Math.round(3+Math.random()*3);
    const dur=Math.round(8+Math.random()*8);
    const text=up?`📰 Nachfrage nach ${GOODS[g].name} steigt in ${lead} Tagen`:`📰 Nachfrage nach ${GOODS[g].name} fällt in ${lead} Tagen`;
    S.pendingNews.push({good:g, factor, day:S.day+lead, dur, text, fired:false});
    addLog(text, up?"good":"bad");
  }
}
function weatherTick(){
  if(S.weather.days>0){ S.weather.days--; if(S.weather.days===0){ addLog(`Wetter normalisiert sich (${S.weather.type} vorbei).`,""); S.weather={type:'',factor:1,days:0}; } }
  else if(Math.random()<0.02){
    const dürre=Math.random()<0.5;
    S.weather={type:dürre?"Dürre":"Frost", factor:dürre?0.6:0.45, days:Math.round(3+Math.random()*5)};
    addLog(`${S.weather.type}! Agrarproduktion −${Math.round((1-S.weather.factor)*100)}% für ${S.weather.days} Tage.`,"bad"); toast(`${dürre?'🌵':'🥶'} ${S.weather.type}`);
  }
}

/* ============ AKTIONEN ============ */
function build(id){
  const cost=buildCost(id);
  if(S.cash<cost){ toast("Nicht genug Kapital."); return; }
  if(level()<BUILDINGS[id].unlock){ return; }
  S.cash-=cost; S.totalInvested+=cost;
  S.buildings[id]=(S.buildings[id]||0)+1;
  addLog(`${BUILDINGS[id].name} gebaut (${eur(cost)}).`,"");
  render(); persist();
}
function buy(g, qty){
  const cost = qty*S.prices[g]*1.05; // Einkauf mit kleinem Aufschlag (Spread)
  if(S.cash<cost){ toast("Nicht genug Kapital."); return; }
  S.cash-=cost; S.warehouse[g]=(S.warehouse[g]||0)+qty;
  S.prices[g]=Math.min(GOODS[g].base*4.5, S.prices[g]*(1+Math.min(0.12,0.0006*qty)));
  toast(`−${eur(cost)} (${qty}× ${GOODS[g].name})`);
  render(); persist();
}
function takeLoan(amt){
  const avail=creditLimit()-(S.debt||0);
  amt=Math.min(amt,avail);
  if(amt<=0){ toast("Kein Kreditrahmen frei."); return; }
  S.debt=(S.debt||0)+amt; S.cash+=amt;
  addLog(`Kredit aufgenommen: ${eur(amt)}.`,"");
  render(); persist();
}
function repayLoan(amt){
  amt=Math.min(amt, S.debt||0, Math.max(0,S.cash));
  if(amt<=0){ toast("Nichts zu tilgen oder kein Kapital."); return; }
  S.debt-=amt; S.cash-=amt;
  addLog(`Kredit getilgt: ${eur(amt)}.`,"");
  render(); persist();
}
function toggleOffer(g){ const o=ensureOffer(g); o.on=!o.on; render(); persist(); }
function adjPrice(g,dir){ const o=ensureOffer(g); const step=Math.max(1,Math.round(GOODS[g].base*0.05)); o.price=Math.max(1, o.price+dir*step); render(); persist(); }
function resetPrice(g){ const o=ensureOffer(g); o.price=Math.max(1,Math.round(effRef(g))); render(); persist(); }
function toggleAutoSell(g){
  if(!S.autoSell[g]) S.autoSell[g]={on:false, markup:0, keep:0};
  S.autoSell[g].on=!S.autoSell[g].on; render(); persist();
}
function adjMarkup(g,dir){
  if(!S.autoSell[g]) S.autoSell[g]={on:false, markup:0, keep:0};
  const step=Math.max(1, Math.round(GOODS[g].base*0.1));
  const cur=S.autoSell[g].markup||0;
  S.autoSell[g].markup=Math.max(0, Math.min(Math.round(GOODS[g].base*2), cur+dir*step));
  render(); persist();
}
function adjKeep(g,dir){
  if(!S.autoSell[g]) S.autoSell[g]={on:false, markup:0, keep:0};
  const step=Math.max(10, Math.round(capacity()*0.05));
  const cur=S.autoSell[g].keep||0;
  S.autoSell[g].keep=Math.max(0, Math.min(capacity(), cur+dir*step));
  render(); persist();
}
function startResearch(g){
  if(S.research){ toast("Es läuft bereits eine Forschung."); return; }
  const c=researchCost(g);
  if(S.cash<c){ toast("Nicht genug Kapital."); return; }
  S.cash-=c; S.research={good:g, endDay:S.day+researchTime(g), total:researchTime(g), startDay:S.day};
  addLog(`Forschung gestartet: ${GOODS[g].name} → Q${quality(g)+1} (${eur(c)}).`,"");
  render(); persist();
}
/* Marktausbau */
function expansionCount(){ return Math.round(((S.marketMult||1)-1)/0.2); }
function expandCost(){ return Math.round(15000*Math.pow(1.8, expansionCount())); }
function expandMarket(){
  const c=expandCost();
  if(S.cash<c){ toast("Nicht genug Kapital."); return; }
  S.cash-=c; S.marketMult=(S.marketMult||1)+0.2; S.pop*=1.05;
  addLog(`Handelsnetz ausgebaut — Absatzmärkte +20 % (${eur(c)}).`,"good");
  render(); persist();
}
/* Gebäude-Ausbau */
function upgradeBuilding(id){
  if((S.buildings[id]||0)<1){ toast("Erst bauen."); return; }
  const c=upgradeCost(id);
  if(S.cash<c){ toast("Nicht genug Kapital."); return; }
  S.cash-=c; S.totalInvested+=c; S.bLvl[id]=bLvl(id)+1;
  addLog(`${BUILDINGS[id].name} auf Stufe ${bLvl(id)} ausgebaut (${eur(c)}).`,"");
  render(); persist();
}
function sellRefund(id){ const cnt=S.buildings[id]||0; return cnt>0 ? Math.round(BUILDINGS[id].cost*Math.pow(1.6,cnt-1)*0.5) : 0; }
function demolish(id){
  const cnt=S.buildings[id]||0; if(cnt<=0) return;
  const refund=sellRefund(id);
  if(!confirm(`${BUILDINGS[id].name} verkaufen? Du erhältst ${eur(refund)} zurück.`)) return;
  S.buildings[id]=cnt-1;
  S.cash+=refund;
  S.totalInvested=Math.max(0,(S.totalInvested||0)-refund);
  if(S.buildings[id]===0) S.bLvl[id]=0;   // letztes Gebäude weg → Ausbaustufe zurück
  addLog(`${BUILDINGS[id].name} verkauft (+${eur(refund)}).`,"");
  render(); persist();
}
/* Löhne */
function adjWage(dir){ S.wage=Math.max(0.5, Math.min(2.0, +(S.wage+dir*0.1).toFixed(1))); render(); persist(); }
/* Exportaufträge */
function acceptContract(){
  const o=S.contractOffer; if(!o) return;
  S.contracts.push({good:o.good, qty:o.qty, price:o.price, filled:0, deadline:S.day+o.days, done:false});
  addLog(`Auftrag angenommen: ${o.qty}× ${GOODS[o.good].name} bis Tag ${S.day+o.days} à ${o.price}€.`,"");
  S.contractOffer=null; render(); persist();
}
function declineContract(){ S.contractOffer=null; render(); persist(); }
/* Schwarzmarkt */
function blackMarket(g){
  const have=S.warehouse[g]||0; if(have<=0){ toast("Lager leer."); return; }
  const gross=have*effRef(g); // keine Gebühr
  if(Math.random()<0.18){ // erwischt
    const fine=Math.round(gross*0.6); S.cash-=fine; S.reputation=Math.max(0,S.reputation-15);
    S.warehouse[g]=0;
    addLog(`Schwarzmarkt aufgeflogen! Strafe ${eur(fine)}, Ruf −15.`,"bad"); toast("🚔 Erwischt!");
  } else {
    S.cash+=gross; S.xp+=gross; S.reputation=Math.max(0,S.reputation-4); S.warehouse[g]=0;
    addLog(`Schwarzmarkt: ${have}× ${GOODS[g].name} gebührenfrei für ${eur(gross)} verkauft.`,"good"); toast(`🤫 +${eur(gross)}`);
  }
  render(); persist();
}
/* Aktien */
function buyStock(s,n){ const c=n*S.stockP[s]*1.01; if(S.cash<c){ toast("Nicht genug Kapital."); return; } S.cash-=c; S.stk[s]=(S.stk[s]||0)+n; render(); persist(); }
function sellStock(s,n){ const have=S.stk[s]||0; n=Math.min(n,have); if(n<=0){ toast("Keine Anteile."); return; } S.cash+=n*S.stockP[s]*0.99; S.stk[s]-=n; render(); persist(); }
function treasuryDeposit(n){ if(n==='all') n=S.cash; n=Math.min(n,S.cash); if(n<=0){ toast("Kein Kapital."); return; } S.cash-=n; S.treasury=(S.treasury||0)+n; render(); persist(); }
function treasuryWithdraw(n){ if(n==='all') n=S.treasury||0; n=Math.min(n,S.treasury||0); if(n<=0){ toast("Fonds leer."); return; } S.treasury-=n; S.cash+=n; render(); persist(); }
/* Exit / Konzernverkauf */
function exitValue(){ const annual=Math.max(0,avgProfit())*120; return Math.round(Math.max(netWorth(), netWorth()*0.5+annual*6)); }
/* ===== Kapitalmarkt: eigener Konzern an der Börse ===== */
const SHARES_TOTAL = 1000000;            // fiktive Gesamtaktienzahl
function companyValuation(){ const annual=Math.max(0,avgProfit())*120; return Math.round(Math.max(netWorth(), netWorth()*0.4+annual*8)); } // Ertragsmultiplikator 8×
function sharePrice(){ return (S.ipo.price>0 ? S.ipo.price : companyValuation()/SHARES_TOTAL); }
function marketCap(){ return sharePrice()*SHARES_TOTAL; }
function goPublic(floatPct){
  if(S.ipo.public){ toast("Bereits börsennotiert."); return; }
  if(companyValuation()<50000){ toast("Konzern noch zu klein für einen Börsengang (ab 50.000 €)."); return; }
  const val=companyValuation();
  const proceeds=Math.round(val*floatPct);
  S.ipo.public=true; S.ipo.floatPct=floatPct; S.ipo.price=val/SHARES_TOTAL; S.ipo.raised=proceeds; S.ipo.paidDiv=0;
  S.cash+=proceeds;
  addLog(`Börsengang! ${Math.round(floatPct*100)} % platziert, ${eur(proceeds)} Emissionserlös. Aktienkurs ${sharePrice().toFixed(2)} €.`,"good");
  toast(`🔔 IPO +${eur(proceeds)}`);
  render(); persist();
}
function issueShares(pct){ // Kapitalerhöhung (verwässert, bringt Geld)
  if(!S.ipo.public){ toast("Erst Börsengang."); return; }
  if(S.ipo.floatPct+pct>0.75){ toast("Streubesitz max. 75 %."); return; }
  const proceeds=Math.round(marketCap()*pct*0.97); // leichter Abschlag
  S.ipo.floatPct+=pct; S.cash+=proceeds;
  S.ipo.price*=(1-0.03); // Verwässerung drückt den Kurs leicht
  addLog(`Kapitalerhöhung: +${Math.round(pct*100)} % platziert, ${eur(proceeds)}. Streubesitz nun ${Math.round(S.ipo.floatPct*100)} %.`,"");
  render(); persist();
}
function buyback(pct){ // Aktienrückkauf (kostet Geld, senkt Dividendenlast, stützt Kurs)
  if(!S.ipo.public){ return; }
  pct=Math.min(pct, S.ipo.floatPct);
  const cost=Math.round(marketCap()*pct*1.05); // Aufpreis
  if(S.cash<cost){ toast("Nicht genug Kapital."); return; }
  S.cash-=cost; S.ipo.floatPct=Math.max(0,S.ipo.floatPct-pct); S.ipo.price*=1.02;
  if(S.ipo.floatPct<=0.001){ S.ipo.public=false; S.ipo.floatPct=0; addLog("Alle Anteile zurückgekauft — Konzern wieder vollständig in Privatbesitz.","good"); }
  else addLog(`Aktienrückkauf: −${Math.round(pct*100)} % Streubesitz für ${eur(cost)}.`,"");
  render(); persist();
}
function acceptTakeover(){
  const t=S.ipo.takeover; if(!t) return;
  const np=(S.prestige||0)+1, nm=S.company;
  wipeSave();
  showOverlay("Übernahme angenommen!", `Ein Investor zahlt ${eur(t.value)} (Aufpreis ${Math.round((t.premium-1)*100)} %) für deinen Konzern. Du startest als Prestige-Stufe ${np} mit mehr Startkapital und größerer Stadt.`, "Neu durchstarten", ()=>{ S=freshState(nm, np); hideOverlay(); $('c-speed').textContent="1×"; setPlay(true); render(); persist(); });
}
function declineTakeover(){ if(S.ipo.takeover){ addLog("Übernahmeangebot abgelehnt.",""); S.ipo.takeover=null; S.ipo.cooldown=40; render(); persist(); } }
function sellCompany(){
  if(netWorth()<GOAL){ toast("Erst ab 1.000.000 € Konzernwert."); return; }
  const val=exitValue(), np=(S.prestige||0)+1, nm=S.company;
  wipeSave();
  showOverlay("Konzern verkauft!", `Verkaufserlös: ${eur(val)}. Du startest als Prestige-Stufe ${np} neu — mit mehr Startkapital und größerer Stadt.`, "Neu durchstarten", ()=>{ S=freshState(nm, np); hideOverlay(); $('c-speed').textContent="1×"; setPlay(true); render(); persist(); });
}
function setTab(t){ S.tab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t)); render(); }
function setPlay(on){ S.running=on; $('c-play').classList.toggle('active',on); $('c-pause').classList.toggle('active',!on); startLoop(); }
function cycleSpeed(){ S.speedIdx=(S.speedIdx+1)%SPEEDS.length; $('c-speed').textContent=SPEEDS[S.speedIdx]+"×"; startLoop(); }
function newGame(){ const nm=S.company; wipeSave(); S=freshState(nm); hideOverlay(); $('c-speed').textContent="1×"; setPlay(true); render(); persist(); }

/* ============ SPEICHERN (Gerät) ============ */
const SAVEKEY='kontor:save:v1';
function lsOK(){ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }catch(e){ return false; } }
const HAS_LS=lsOK();
function persist(){ if(!HAS_LS) return; try{ localStorage.setItem(SAVEKEY, JSON.stringify(S)); }catch(e){} }
function loadSaved(){ if(!HAS_LS) return null; try{ const r=localStorage.getItem(SAVEKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function wipeSave(){ if(!HAS_LS) return; try{ localStorage.removeItem(SAVEKEY); }catch(e){} }
function hydrate(d){ const s=Object.assign(freshState(d.company), d); s.running=false;
  for(const g in GOODS){ if(s.prices[g]==null) s.prices[g]=GOODS[g].base; if(s.warehouse[g]==null) s.warehouse[g]=0; if(s.q[g]==null) s.q[g]=0; }   // neue Waren in alte Spielstände migrieren
  if(s.treasury==null) s.treasury=0;
  return s; }
function saveGame(){ if(!HAS_LS){ toast("Speichern hier nicht verfügbar."); return; } persist(); toast("Spielstand gespeichert."); }
function loadGame(){ const d=loadSaved(); if(d){ S=hydrate(d); $('c-speed').textContent=SPEEDS[S.speedIdx]+"×"; setPlay(false); render(); toast("Spielstand geladen."); } else toast("Kein Spielstand gefunden."); }

/* ============ RENDERING ============ */
function render(){
  // Status
  $('s-company').textContent=S.company;
  $('s-day').textContent="Tag "+fmt(S.day);
  $('s-cash').textContent=eur(S.cash);
  $('s-net').textContent=eur(netWorth());
  const lv=level();
  $('s-level').textContent=`Stufe ${lv} · ${TITLES[Math.min(lv-1,TITLES.length-1)]}`;
  const cur=LEVELS[lv-1]||0, nxt=LEVELS[lv]||LEVELS[LEVELS.length-1];
  const pct = lv>=LEVELS.length?100:Math.max(0,Math.min(100,(S.xp-cur)/(nxt-cur)*100));
  $('s-lvlbar').style.width=pct+"%";
  $('s-xp').textContent = lv>=LEVELS.length? "max. Stufe" : `${fmt(S.xp)} / ${fmt(nxt)} GP`;

  if(S.tab==="betrieb") renderBetrieb();
  else if(S.tab==="markt") renderMarkt();

  else if(S.tab==="handel") renderHandel();
  else renderKonzern();
}
function statusBanner(){
  const c=cycle(), s=season();
  let b=`<div class="banner"><span>${SEASON_ICO[s]} ${SEASON_NAMES[s]}</span><span>${c.phase>=0?'📈':'📉'} ${c.name}</span><span>👥 ${fmt(S.pop)}</span></div>`;
  if(S.weather.days>0) b+=`<div class="banner warn">${S.weather.type==='Dürre'?'🌵':'🥶'} ${S.weather.type} aktiv — Agrar −${Math.round((1-S.weather.factor)*100)}% (${S.weather.days} T.)</div>`;
  if(S.strikeDays>0) b+=`<div class="banner warn">✊ Streik — Produktion steht (${S.strikeDays} T.). Löhne erhöhen!</div>`;

  return b;
}

function renderTicker(){
  let html="";
  for(const g in GOODS){
    const p=effRef(g), base=GOODS[g].base;

    const cls=diff>=0?"up":"down", ar=diff>=0?"▲":"▼";
    html+=`<span class="tk"><span class="nm">${GOODS[g].name}</span> ${p.toFixed(1)}€ <span class="${cls}">${ar}${Math.abs(diff).toFixed(0)}%</span></span>`;
  }

function renderBetrieb(){
  const lv=level();
  UTIL=buildingUtil();

    h+=`<div class="hint">Willkommen, Chef. Du startest mit <b>${eur(S.cash)}</b>. Baue zuerst einen <b>Bauernhof</b> oder <b>Kuhstall</b>, um Rohwaren zu erzeugen — diese verkaufst du dann im <b>Markt</b>. Veredelte Waren bringen deutlich mehr.</div>`;
  }

  </div><div class="sub" style="margin-top:6px;font-size:11px">Höhere Löhne = mehr Output, aber teurer. Unter 0,9× drohen Streiks.</div></div>`;

    const b=BUILDINGS[id], cnt=S.buildings[id];
    h+=buildingCard(id,b,cnt,lv,true);

function buildingCard(id,b,cnt,lv,showOwned,buyMoreOnly){
  const locked=lv<b.unlock;
  const cost=buildCost(id);
  const lvl=bLvl(id);
  const f=effFactor(id);
  const prod=Object.entries(b.produces).map(([g,n])=>{
    const real=Math.round(n*(S.buildings[id]?f:outMult(id)*wageProd()));
    return `${real}× ${GOODS[g].ico}${GOODS[g].name}`;
  }).join(", ");
  const cons=Object.keys(b.consumes).length?Object.entries(b.consumes).map(([g,n])=>`${n}× ${GOODS[g].name}`).join(", "):null;
  let chain="";
  if(cons) chain=`<div class="chain">${cons} <span class="arr">→</span> ${prod} · pro Tag</div>`;
  else chain=`<div class="chain"><span class="arr">⤷</span> ${prod} · pro Tag</div>`;

  return `<div class="card ${locked?'locked':''}">
    <div class="row">
      <div class="ico">${b.ico}</div>
      <div class="grow">
        <div class="name">${b.name}${lvl>0?` <span class="pill" style="background:var(--green-700);color:var(--paper)">Stufe ${lvl}</span>`:''}</div>
        <div class="sub">Unterhalt ${Math.round(b.upkeep*upMult(id)*S.wage)}€/Tag${cnt>0?` · ${cnt} im Besitz`:''}</div>
      </div>
      ${showOwned?`<div class="owned">${cnt}</div>`:''}
    </div>
    ${chain}
    ${ (cnt>0 && !locked) ? (()=>{ const u=UTIL[id]||{active:cnt,cnt:cnt,lim:null};
        if(!Object.keys(b.consumes).length) return `<div class="chain" style="color:var(--gain)">✅ Voll ausgelastet (${cnt}/${cnt})</div>`;
        if(u.active>=cnt) return `<div class="chain" style="color:var(--gain)">✅ Voll ausgelastet (${cnt}/${cnt}) — ${GOODS[Object.keys(b.consumes)[0]].name} reicht</div>`;
        if(u.active<=0) return `<div class="chain" style="color:var(--loss)">⛔ Steht still — zu wenig ${GOODS[u.lim].name} (Lager ${fmt(S.warehouse[u.lim]||0)})</div>`;
        return `<div class="chain" style="color:var(--brass)">⚠️ Läuft nur ${u.active}/${cnt} — ${GOODS[u.lim].name} fehlt</div>`;
      })() : '' }
    ${ locked
      ? `<div class="btn btn-build" style="background:var(--paper-2);color:var(--loss);cursor:default">🔒 Ab Stufe ${b.unlock}</div>`
      : `<button class="btn btn-build" data-build="${id}" ${S.cash<cost?'disabled':''}>${cnt>0?'Weiteren bauen':'Bauen'}<span class="c">${eur(cost)}</span></button>`
    }
    ${ (!locked && cnt>0) ? `<button class="btn btn-build" data-upg="${id}" ${S.cash<upgradeCost(id)?'disabled':''} style="margin-top:7px;background:var(--green-800)">⬆ Ausbauen → Stufe ${lvl+1} (+25% Output)<span class="c">${eur(upgradeCost(id))}</span></button>` : '' }
    ${ (!locked && cnt>0) ? `<button class="btn" data-sell="${id}" style="margin-top:7px;background:none;border:1px solid var(--line);color:var(--ink-soft);font-size:12.5px;padding:7px 10px">🏚 Verkaufen <span style="color:var(--gain);font-weight:700">+${eur(sellRefund(id))}</span></button>` : '' }
  </div>`;
}

function renderMarkt(){
  let h=prodBar();
  h+=`<div class="hint" style="margin-bottom:12px">Du setzt pro Ware deinen <b>Verkaufspreis</b>. Je günstiger du gegenüber dem Richtpreis anbietest, desto mehr nimmt der Markt ab — über dem 2,5-fachen Richtpreis kauft niemand. Jeder Verkauf kostet <b>10 % Gebühr</b>. Schalte <b>Auto an</b>, damit zum Richtpreis verkauft wird — mit <b>Aufschlag</b> ein paar Euro darüber (mehr Marge, etwas weniger Absatz). Die <b>Mindestmenge</b> bleibt immer im Lager.</div>`;
  h+=`<div class="sect-title">Markt & Verkauf</div>`;
  const ownKeys = Object.keys(GOODS).filter(ownsProducer);
  const keys = MKT_ALL ? Object.keys(GOODS) : ownKeys;
  h+=`<div class="auto" style="margin:-4px 2px 12px;border:none;padding:0">
    <div class="sub" style="font-size:11.5px">${MKT_ALL?'Alle Waren (auch zum Zukaufen)':'Nur Waren, die du selbst produzierst'}</div>
    <button class="btn autotgl ${MKT_ALL?'on':''}" id="mkt-all">${MKT_ALL?'Alle Waren':'Nur eigene'}</button>
  </div>`;
  if(keys.length===0){
    h+=`<div class="card"><div class="sub" style="text-align:center;padding:14px 4px">Du produzierst noch nichts. Bau im <b>Betrieb</b>-Tab deinen ersten Betrieb — dann erscheint die Ware hier.<br><br>Vorprodukte zum Zukaufen findest du über <b>„Alle Waren"</b> oben.</div></div>`;
  }
  for(const g of keys){
    const have=S.warehouse[g]||0;
    const base=GOODS[g].base, er=effRef(g), diff=(er/base-1)*100;
    const cogs=fullCost(g);
    const cls=diff>=0?"up":"down", ar=diff>=0?"▲":"▼";
    const cap=capacity();
    const fillPct=Math.max(0,Math.min(100, have/cap*100));
    const nearFull = have>=cap*0.9;
    const o=S.sell[g]||{price:Math.max(1,Math.round(er)), on:(have>0)};
    const q=quality(g);
    const autoOn=!!(S.autoSell[g] && S.autoSell[g].on);
    const mk=(S.autoSell[g] && S.autoSell[g].markup)||0;
    const effPrice = autoOn ? Math.max(1, Math.round(er)+mk) : o.price;  // tatsächlicher Verkaufspreis
    const want=predictSales(g, effPrice);
    const netPrice=effPrice*0.9;          // nach 10% Gebühr
    const margin=netPrice-cogs;
    const marginPct=Math.round(margin/netPrice*100);
    const marginCls=margin>=0?'var(--gain)':'var(--loss)';
    const soldU=S.soldUnits[g]||0, soldR=S.soldRev[g]||0;
    h+=`<div class="card">

function renderKette(){
  let h=`<div class="hint" style="margin-bottom:12px">So hängen deine Waren zusammen: Rohstoffe werden zu Zwischen- und Endprodukten veredelt. <b style="color:var(--gain)">Grün</b> = du deckst die Stufe mit einem Gebäude ab. <b>Gestrichelt</b> = Lücke — das Vorprodukt musst du zukaufen (Markt → „Alle Waren").</div>`;
  h+=`<div class="sect-title">Wirtschaftsketten</div>`;
  // Rohstoffe = Waren, deren Gebäude nichts verbraucht
  const raws=[];
  for(const id in BUILDINGS){
    if(Object.keys(BUILDINGS[id].consumes||{}).length===0){
      for(const out in BUILDINGS[id].produces) raws.push(out);
    }
  }
  function nextGoods(good){
    const res=[];
    for(const id in BUILDINGS){
      if(BUILDINGS[id].consumes && BUILDINGS[id].consumes[good]){
        for(const out in BUILDINGS[id].produces) res.push(out);
      }
    }
    return res;
  }
  function chainFrom(root){
    const path=[root]; let cur=root, guard=0;
    while(guard++<8){ const nx=nextGoods(cur); if(!nx.length) break; cur=nx[0]; path.push(cur); }
    return path;
  }
  function node(g){
    const pid=PRODUCER[g], b=BUILDINGS[pid], owned=ownsProducer(g), stock=S.warehouse[g]||0;
    return `<div style="flex:0 0 auto;text-align:center;min-width:88px;padding:10px 8px;border-radius:10px;border:1.5px ${owned?'solid var(--gain)':'dashed var(--line)'};background:${owned?'rgba(44,138,85,.08)':'var(--paper-2)'}">
      <div style="font-size:23px;line-height:1">${GOODS[g].ico}</div>
      <div class="name" style="font-size:12.5px;margin-top:4px">${GOODS[g].name}</div>
      <div class="sub" style="font-size:10px;margin-top:2px">${b?b.ico+' '+b.name:''}</div>
      <div style="font-size:10px;font-weight:700;margin-top:4px;color:${owned?'var(--gain)':'var(--ink-soft)'}">${owned?'✓ Lager '+fmt(stock):'fehlt'}</div>
    </div>`;
  }
  for(const root of raws){
    const path=chainFrom(root);
    const have=path.filter(ownsProducer).length;
    let row='';
    path.forEach((g,i)=>{
      row+=node(g);
      if(i<path.length-1) row+=`<div style="flex:0 0 auto;align-self:center;font-size:18px;color:var(--brass);font-weight:700">→</div>`;
    });
    const full=have===path.length;
    h+=`<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <div class="name" style="font-size:14px">${GOODS[root].name} → ${GOODS[path[path.length-1]].name}</div>
        <span class="pill" style="background:${full?'var(--gain)':'var(--paper-2)'};color:${full?'#fff':'var(--ink-soft)'}">${have}/${path.length} Stufen</span>
      </div>
      <div style="display:flex;align-items:stretch;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px">${row}</div>
    </div>`;
  }
  $('content').innerHTML=h;
}

        <div class="name" style="font-size:14px">🤝 Übernahmeangebot</div>
        <div class="sub" style="margin-top:4px">Ein Investor bietet <b style="color:var(--ink)">${eur(S.ipo.takeover.value)}</b> (+${Math.round((S.ipo.takeover.premium-1)*100)} % Aufpreis) für deinen Konzern. Annehmen = lukrativer Exit + Prestige.</div>
        <div class="trade"><button class="btn sell" id="tk-accept">Annehmen</button><button class="btn buy" id="tk-decline">Ablehnen</button></div>
      </div>`;
    }
  }

  h+=`<div class="sect-title">Finanzamt & Exit</div>
  <div class="card">
    <div class="row" style="justify-content:space-between"><span class="sub" style="font-size:13px">Quartalsgewinn (laufend)</span><span class="price" style="font-size:14px;color:${S.qProfit>=0?'var(--gain)':'var(--loss)'}">${S.qProfit>=0?'+':'−'}${eur(Math.abs(S.qProfit))}</span></div>
    <div class="row" style="justify-content:space-between;margin-top:4px"><span class="sub" style="font-size:13px">Letzte Steuer</span><span class="price" style="font-size:14px;color:var(--loss)">${eur(S.lastTax||0)}</span></div>
    <div class="row" style="justify-content:space-between;margin-top:4px"><span class="sub" style="font-size:13px">Prestige-Stufe</span><span class="pill">${S.prestige||0}</span></div>
    <div class="sub" style="margin-top:7px;font-size:11px">25 % Steuer pro Quartal auf den Gewinn nach Abschreibung (AfA 4 % der Investitionen).</div>
    <button class="btn btn-build" id="b-exit" ${netWorth()<GOAL?'disabled':''} style="margin-top:9px;background:var(--brass);color:var(--green-900)">💼 Konzern verkaufen (Exit) — ${eur(exitValue())}</button>
    <div class="sub" style="margin-top:5px;font-size:11px">${netWorth()<GOAL?'Ab 1.000.000 € Konzernwert möglich.':'Verkaufen und mit Prestige-Bonus neu starten.'}</div>
  </div>`;

  h+=`<div class="sect-title">Ereignisse</div><div class="card log">`;
  for(const e of S.log.slice(0,14)) h+=`<div class="e ${e.c}"><span class="d">T${fmt(e.day)}</span><span class="t">${e.t}</span></div>`;
  h+=`</div>`;

  h+=`<div class="sect-title">Einstellungen</div>
  <div class="card">
    <div class="field"><label>Name des Konzerns</label><input id="in-company" value="${S.company.replace(/"/g,'&quot;')}" maxlength="28"></div>
    <div class="sub" style="font-size:11px;margin-bottom:10px">${HAS_LS?'Dein Fortschritt wird automatisch auf diesem Gerät gespeichert.':'Auf diesem Gerät kann nicht dauerhaft gespeichert werden.'}</div>
    <button class="btn btn-build" id="b-save" style="margin-top:0">💾 Jetzt speichern</button>
    <button class="btn btn-build" id="b-load" style="background:var(--green-800)">📂 Letzten Stand laden</button>
    <button class="btn danger" id="b-new">Neu beginnen</button>
  </div>`;
  $('content').innerHTML=h;

  $('in-company').addEventListener('change',e=>{ S.company=e.target.value.trim()||"Mein Kontor"; $('s-company').textContent=S.company; persist(); });
  $('b-save').onclick=saveGame;
  $('b-load').onclick=loadGame;
  $('b-new').onclick=()=>{ if(confirm("Neues Spiel starten? Der aktuelle Fortschritt geht verloren.")) newGame(); };
  document.querySelectorAll('[data-loan]').forEach(b=>b.onclick=()=>takeLoan(parseInt(b.dataset.loan)));
  document.querySelectorAll('[data-repay]').forEach(b=>b.onclick=()=>repayLoan(b.dataset.repay==='all'?(S.debt||0):parseInt(b.dataset.repay)));
  document.querySelectorAll('[data-dep]').forEach(b=>b.onclick=()=>treasuryDeposit(b.dataset.dep==='all'?'all':parseInt(b.dataset.dep)));
  document.querySelectorAll('[data-wd]').forEach(b=>b.onclick=()=>treasuryWithdraw('all'));
  $('b-exit') && ($('b-exit').onclick=()=>{ if(confirm("Konzern verkaufen und mit Prestige-Bonus neu starten?")) sellCompany(); });
  document.querySelectorAll('[data-ipo]').forEach(b=>b.onclick=()=>{ if(confirm(`${Math.round(parseFloat(b.dataset.ipo)*100)} % an die Börse bringen?`)) goPublic(parseFloat(b.dataset.ipo)); });
  document.querySelectorAll('[data-issue]').forEach(b=>b.onclick=()=>issueShares(parseFloat(b.dataset.issue)));
  document.querySelectorAll('[data-buyback]').forEach(b=>b.onclick=()=>buyback(parseFloat(b.dataset.buyback)));
  $('tk-accept') && ($('tk-accept').onclick=()=>{ if(confirm("Übernahmeangebot annehmen und neu durchstarten?")) acceptTakeover(); });
  $('tk-decline') && ($('tk-decline').onclick=declineTakeover);
}

/* ============ BINDINGS ============ */
function bindBuild(){ document.querySelectorAll('[data-build]').forEach(b=>b.onclick=()=>build(b.dataset.build)); }
function autoSellRow(g){
  const as=S.autoSell[g]||{on:false, markup:0, keep:0};
  const markup=as.markup||0, keep=as.keep||0;
  const er=Math.round(effRef(g));
  return `<div style="margin-top:8px;border-top:1px solid var(--line);padding-top:9px;display:flex;flex-direction:column;gap:8px">
    <div class="autolim" style="justify-content:space-between;width:100%;font-size:12px">
      <span>🤖 Aufschlag ${markup>0?`<b>+${eur(markup)}</b> <span class="sub">(= ${eur(er+markup)})</span>`:'<span class="sub">aus</span>'}</span>
      <span style="display:flex;gap:7px;flex:0 0 auto"><button data-am="${g}" data-d="-1">−</button><button data-am="${g}" data-d="1">+</button></span>
    </div>
    <div class="autolim" style="justify-content:space-between;width:100%;font-size:12px">
      <span>📦 Im Lager behalten <b>${keep>0?fmt(keep)+' Stk':'aus'}</b></span>
      <span style="display:flex;gap:7px;flex:0 0 auto"><button data-ak="${g}" data-d="-1">−</button><button data-ak="${g}" data-d="1">+</button></span>
    </div>
    <button class="btn autotgl ${as.on?'on':''}" data-autosell="${g}" style="width:100%">${as.on?'Auto-Verkauf an (zum Richtpreis)':'Auto-Verkauf aus'}</button>
  </div>`;
}

function bindMarket(){
  const mkAll=$('mkt-all'); if(mkAll) mkAll.onclick=()=>{ MKT_ALL=!MKT_ALL; render(); };
  document.querySelectorAll('[data-offer]').forEach(b=>b.onclick=()=>toggleOffer(b.dataset.offer));
  document.querySelectorAll('[data-adj]').forEach(b=>b.onclick=()=>adjPrice(b.dataset.adj, parseInt(b.dataset.d)));
  document.querySelectorAll('[data-reset]').forEach(b=>b.onclick=()=>resetPrice(b.dataset.reset));
  document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buy(b.dataset.buy, 100));
  document.querySelectorAll('[data-autosell]').forEach(b=>b.onclick=()=>toggleAutoSell(b.dataset.autosell));
  document.querySelectorAll('[data-am]').forEach(b=>b.onclick=()=>adjMarkup(b.dataset.am, parseInt(b.dataset.d)));
  document.querySelectorAll('[data-ak]').forEach(b=>b.onclick=()=>adjKeep(b.dataset.ak, parseInt(b.dataset.d)));
}

/* ============ OVERLAY ============ */
function showOverlay(title,text,btn,cb){
  const o=$('overlay'); o.classList.remove('hidden');
  o.innerHTML=`<h1>${title}</h1><p>${text}</p><button class="btn" id="ov-btn">${btn}</button>`;
  $('ov-btn').onclick=cb;
}
function hideOverlay(){ $('overlay').classList.add('hidden'); if(!S.bankrupt) setPlay(true); }

/* ============ INIT ============ */
const saved=loadSaved();
S = saved ? hydrate(saved) : freshState();
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
$('c-play').onclick=()=>setPlay(true);
$('c-pause').onclick=()=>setPlay(false);
$('c-speed').onclick=cycleSpeed;
$('c-speed').textContent=SPEEDS[S.speedIdx]+"×";
if(saved){ setPlay(false); toast("Fortschritt geladen — auf ▶ tippen."); }
render();
startLoop();
window.addEventListener('beforeunload', persist);
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
